<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géomancie Ramli</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .kër { background: #161622; padding: 15px; border-radius: 8px; border: 1px solid #2a2a3a; }
        .kër-tur { font-size: 12px; color: #ff9900; font-weight: bold; }
        .tomb-yi { font-size: 26px; letter-spacing: 6px; color: #00ffcc; margin: 10px 0; line-height: 1; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 16px; }
        .atte-box { background: #1c1c3a; border: 2px solid #00ffcc; border-radius: 12px; padding: 20px; max-width: 1000px; margin: 30px auto; text-align: left; }
        .atte-text { font-size: 16px; color: #ffffff; line-height: 1.6; }
        .highlight { color: #ffcc00; font-weight: bold; }
        button { background: #007644; color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; margin-top: 10px; }
        .nav-links a { background: #1c1c3a; color: #00ffcc; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; margin: 0 5px 25px 5px; border: 1px solid #00ffcc; }
    </style>
</head>
<body>

    <!-- Box PIN de Sécurité -->
    <div id="pinBox" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f15; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <h2 style="color: #00ffcc;">Veuillez entrer le code PIN</h2>
        <p style="color: #aaa;">Valide pendant 5 jours.</p>
        <input type="password" id="pinInput" placeholder="PIN..." style="padding: 12px; font-size: 16px; border-radius: 8px; text-align: center; margin-bottom: 15px;">
        <button onclick="verifierPIN()">Valider</button>
        <p id="pinErreur" style="color: #ff3333; margin-top: 10px;"></p>
    </div>

    <h1>Géomancie Ramli</h1>
    
    <div class="nav-links">
        <a href="index.html">Wolof</a>
        <a href="arabic.html">العربية</a>
    </div>

    <br><button onclick="toggRamli()">Lancer le Tirage</button>

    <div class="grid" id="ramliGrid"></div>

    <div class="atte-box" id="atteBox" style="display:none;">
        <div class="atte-text" id="atteTexte"></div>
    </div>

    <script>
        const KODD_PIN_DEGGU = "1234"; 

        window.onload = function() {
            let pinDencu = localStorage.getItem("ramli_pin");
            let dateDencu = localStorage.getItem("ramli_pin_date");
            if (pinDencu === KODD_PIN_DEGGU && dateDencu) {
                let dateLeegi = new Date().getTime();
                let coonoFan = (dateLeegi - parseInt(dateDencu)) / (1000 * 60 * 60 * 24);
                if (coonoFan < 5) {
                    document.getElementById("pinBox").style.display = "none";
                } else {
                    localStorage.clear();
                    alert("PIN expiré après 5 jours !");
                }
            }
        };

        function verifierPIN() {
            let valueInput = document.getElementById("pinInput").value;
            if (valueInput === KODD_PIN_DEGGU) {
                localStorage.setItem("ramli_pin", valueInput);
                localStorage.setItem("ramli_pin_date", new Date().getTime().toString());
                document.getElementById("pinBox").style.display = "none";
            } else {
                document.getElementById("pinErreur").innerText = "PIN incorrect !";
            }
        }

        const firi_atte = {
            "1,1,2,1": { tur: "Yusuf", xew: "Bénédiction et argent à venir." },
            "1,2,2,2": { tur: "Adama", xew: "Grand prestige et autorité durable." },
            "2,1,1,1": { tur: "Muhammad", xew: "Affaire cachée ou joie secrète." },
            "2,2,1,2": { tur: "Idris", xew: "Force, stabilité et protection." },
            "1,1,1,1": { tur: "Ibrahim", xew: "Mouvement gaaw ou grand voyage." },
            "1,2,1,2": { tur: "Issa", xew: "Joie, rires et bonheur immédiat." },
            "2,1,2,2": { tur: "Oumar", xew: "Secret mystérieux à patienter." },
            "2,2,2,1": { tur: "Ayouba", xew: "Difficulté ou blocage passager." },
            "1,1,2,2": { tur: "Jibriil", xew: "Réunion, union ou mariage." },
            "1,2,2,1": { tur: "Souleymane", xew: "Paix totale et pureté du coeur." },
            "2,1,1,2": { tur: "Aliou", xew: "Colère ou affrontement intense." },
            "2,2,1,1": { tur: "Nouhou", xew: "Épreuve lourde, besoin de prières." },
            "1,1,1,2": { tur: "Hasan", xew: "Fatigue ou paroles confuses." },
            "1,2,1,1": { tur: "Yunus", xew: "Victoire claire et délivrance." },
            "2,1,2,1": { tur: "Ousmane", xew: "Coupure ou obstacle flou." },
            "2,2,2,2": { tur: "Moussa", xew: "Rassemblement mais confusion." }
        };

        function rëddRandom() { return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1]; }
        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }
        function fusionner(f1, f2) { return [booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2)]; }

        function toggRamli() {
            let m = []; 
            for (let i=0; i<4; i++) m.push(rëddRandom());
            
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);

            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));

            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));

            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';
            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let name = firi_atte[cle]?.tur || "Inconnu";
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");
                grid.innerHTML += `<div class="kër"><div class="kër-tur">Maison ${i+1}</div><div class="tomb-yi">${visuel}</div><div class="mbindeef-tur">${name}</div></div>`;
            });

            // Corigé gu wër ngir index kër yi dëgg-dëgg
            let firiM1 = firi_atte[m.join(",")] || { tur: "Figure", xew: "affaire visible" };
            let firiM15 = firi_atte[m.join(",")] || { tur: "Figure", xew: "élément clé" };
            let firiM16 = firi_atte[m.join(",")] || { tur: "Figure", xew: "conclusion" };

            document.getElementById('atteTexte').innerHTML = `
                <b>Maison 1 (${firiM1.tur}) :</b> ${firiM1.xew}<br><br>
                <b>Maison 15 (${firiM15.tur}) :</b> ${firiM15.xew}<br><br>
                <b>Maison 16 (${firiM16.tur}) :</b> <span class="highlight">${firiM16.xew}</span>
            `;
            document.getElementById('atteBox').style.display = 'block';
        }
    </script>
</body>
</html>
