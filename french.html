<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géomancie Ramli - Leeral</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00ffcc; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .kër { background: #161622; padding: 15px; border-radius: 8px; border: 1px solid #2a2a3a; text-align: center; }
        .kër-tur { font-size: 12px; color: #ff9900; font-weight: bold; text-transform: uppercase; }
        .tomb-yi { font-size: 26px; letter-spacing: 6px; line-height: 1; color: #00ffcc; margin: 10px 0; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 16px; }
        
        .atte-gu-mujj-box { 
            background: linear-gradient(135deg, #1c1c3a, #161622); 
            border: 2px solid #00ffcc; 
            border-radius: 12px; 
            padding: 25px; 
            max-width: 1000px; 
            margin: 30px auto; 
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,255,204,0.15);
        }
        .atte-header { font-size: 20px; color: #00ffcc; font-weight: bold; border-bottom: 2px solid #2a2a3a; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .atte-text { font-size: 16px; line-height: 1.6; color: #ffffff; }
        .highlight { color: #ffcc00; font-weight: bold; }
        
        button { background: linear-gradient(135deg, #007644, #009955); color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,118,68,0.4); transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,118,68,0.6); }
        .nav-links a { background: #1c1c3a; color: #00ffcc; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; border: 1px solid #00ffcc; display: inline-block; margin: 0 5px 25px 5px; }
    </style>
</head>
<body>

    <!-- Box de sécurité PIN -->
    <div id="pinBox" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f15; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <h2 style="color: #00ffcc; padding: 0 15px;">Veuillez entrer votre code PIN pour ouvrir l'application</h2>
        <p style="color: #aaa; font-size: 14px;">Ce code PIN est valide pendant 5 jours.</p>
        <input type="password" id="pinInput" placeholder="Entrez le PIN ici..." style="padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #333; background: #161622; color: white; text-align: center; width: 200px; margin-bottom: 15px;">
        <button onclick="verifierPIN()" style="background: linear-gradient(135deg, #007644, #009955); color: white; border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 20px; font-weight: bold;">Valider</button>
        <p id="pinErreur" style="color: #ff3333; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <h1>Géomancie Ramli</h1>
    
    <!-- Liens de navigation lakk yi -->
    <div class="nav-links">
        <a href="index.html">Wolof (وولوف)</a>
        <a href="arabic.html">العربية (Arabe)</a>
    </div>

    <br><button onclick="toggRamli()">Lancer le Tirage (Tombée)</button>

    <div class="grid" id="ramliGrid"></div>

    <div class="atte-gu-mujj-box" id="atteBox" style="display:none;">
        <div class="atte-header">Jugement Final du Thème</div>
        <div class="atte-text" id="atteTexte"></div>
    </div>

    <script>
        const KODD_PIN_DËGGU = "1234"; 

        window.onload = function() {
            let pinDencu = localStorage.getItem("ramli_pin");
            let dateDencu = localStorage.getItem("ramli_pin_date");

            if (pinDencu === KODD_PIN_DËGGU && dateDencu) {
                let dateLeegi = new Date().getTime();
                let coonoFan = (dateLeegi - parseInt(dateDencu)) / (1000 * 60 * 60 * 24);

                if (coonoFan < 5) {
                    document.getElementById("pinBox").style.display = "none";
                } else {
                    localStorage.removeItem("ramli_pin");
                    localStorage.removeItem("ramli_pin_date");
                    alert("Votre code PIN a expiré (limite de 5 jours atteinte) ! Veuillez demander un nouveau code.");
                }
            }
        };

        // Corrigé dërët pour que le bouton Valider fonctionne à coup sûr
        function verifierPIN() {
            let valueInput = document.getElementById("pinInput").value;
            if (valueInput === KODD_PIN_DËGGU) {
                let dateLeegi = new Date().getTime();
                localStorage.setItem("ramli_pin", valueInput);
                localStorage.setItem("ramli_pin_date", dateLeegi.toString());
                document.getElementById("pinBox").style.display = "none";
            } else {
                document.getElementById("pinErreur").innerText = "Code PIN incorrect ! Veuillez réessayer.";
            }
        }

        const firi_atte = {
            "1,1,2,1": { tur: "Yusuf", xew: "entrée d'une bénédiction, d'argent ou d'un soutien spirituel fort à venir." },
            "1,2,2,2": { tur: "Adama", xew: "grand prestige, autorité, bénédiction vaste et richesse durable dans votre vie." },
            "2,1,1,1": { tur: "Muhammad", xew: "affaire cachée, secret solide ou joie discrète qui durera longtemps." },
            "2,2,1,2": { tur: "Idris", xew: "grande force, stabilité et soutien qui vous accompagne sur votre chemin." },
            "1,1,1,1": { tur: "Ibrahim", xew: "l'affaire est en mouvement, un grand voyage ou une voie ouverte apparaît rapidement." },
            "1,2,1,2": { tur: "Issa", xew: "rires, joie et grand bonheur qui effacent tous vos soucis et difficultés." },
            "2,1,2,2": { tur: "Oumar", xew: "affaire mystérieuse, cachée et véridique. Il faut patienter jusqu'à sa révélation." },
            "2,2,2,1": { tur: "Ayouba", xew: "recul temporaire ou épreuve difficile qui entre dans l'esprit, nécessite de la patience." },
            "1,1,2,2": { tur: "Jibriil", xew: "réunion bénéfique, mariage ou union de biens pour un travail important et réussi." },
            "1,2,2,1": { tur: "Souleymane", xew: "paix totale, lumière et pureté du cœur. Le bien et la facilité apparaissent." },
            "2,1,1,2": { tur: "Aliou", xew: "colère, affrontement ou épreuve intense. Il faut être prudent et se contrôler." },
            "2,2,1,1": { tur: "Nouhou", xew: "difficulté majeure, blocage ou douleur interne qui pèse, nécessite des prières." },
            "1,1,1,2": { tur: "Hasan", xew: "fatigue, perte de biens ou paroles confuses qui perturbent l'affaire. Soyez vigilant." },
            "1,2,1,1": { tur: "Yunus", xew: "victoire claire, gain et sortie définitive des problèmes vers la délivrance." },
            "2,1,2,1": { tur: "Ousmane", xew: "obstacle ou coupure entre vous et ce que vous cherchez, l'affaire est floue." },
            "2,2,2,2": { tur: "Moussa", xew: "les gens se rassemblent autour de vous, l'affaire s'étend mais avec une certaine confusion." }
        };

        function rëddRandom() { return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1]; }
        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }
        function fusionner(f1, f2) { return [booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2)]; }

        function toggRamli() {
            let m = []; 
            for (let i=0; i<4; i++) m.push(rëddRandom());
            
            // Juralanté 16 kër yu dëggu yi
            m.push([m[0][0], m[1][0], m[2][0], m[3][0]]); // M5
            m.push([m[0][1], m[1][1], m[2][1], m[3][1]]); // M6
            m.push([m[0][2], m[1][2], m[2][2], m[3][2]]); // M7
            m.push([m[0][3], m[1][3], m[2][3], m[3][3]]); // M8

            m.push(fusionner(m[0], m[1])); // M9
            m.push(fusionner(m[2], m[3])); // M10
            m.push(fusionner(m[4], m[5])); // M11
            m.push(fusionner(m[6], m[7])); // M12

            m.push(fusionner(m[8], m[9]));   // M13
            m.push(fusionner(m[10], m[11])); // M14
            m.push(fusionner(m[12], m[13])); // M15 (Le Juge)
            m.push(fusionner(m[14], m[0]));   // M16 (La Sentence)

            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';
            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let name = firi_atte[cle]?.tur || "Inconnu";
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");
                grid.innerHTML += `<div class="kër"><div class="kër-tur">Maison ${i+1}</div><div class="tomb-yi">${visuel}</div><div class="mbindeef-tur">${name}</div></div>`;
            });

            let firiM1 = firi_atte[m[0].join(",")] || { tur: "Figure", xew: "affaire visible" };
            let firiM15 = firi_atte[m[14].join(",")] || { tur: "Figure", xew: "élément clé" };
            let firiM16 = firi_atte[m[15].join(",")] || { tur: "Figure", xew: "conclusion" };

            const texteAtte = `
                D'après le thème généré : Le consultant (<span class="highlight">Maison 1</span>) se trouve dans la figure de <span class="highlight">${firiM1.tur}</span>. 
                Cela indique sa situation actuelle : ${firiM1.xew}<br><br>
