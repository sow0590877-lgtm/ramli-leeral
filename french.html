<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Géomancie Ramli</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .kër { background: #161622; padding: 15px; border-radius: 8px; border: 1px solid #2a2a3a; }
        .kër-tur { font-size: 12px; color: #ff9900; font-weight: bold; }
        .tomb-yi { font-size: 26px; letter-spacing: 6px; color: #00ffcc; margin: 10px 0; line-height: 1; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 16px; }
        .atte-box { background: #1c1c3a; border: 2px solid #00ffcc; border-radius: 12px; padding: 25px; max-width: 1000px; margin: 30px auto; text-align: left; }
        .atte-header { font-size: 20px; color: #00ffcc; font-weight: bold; border-bottom: 2px solid #2a2a3a; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .atte-text { font-size: 16px; color: #ffffff; line-height: 1.6; }
        .highlight { color: #ffcc00; font-weight: bold; }
        button { background: #007644; color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; margin-top: 10px; }
        .nav-links a { background: #1c1c3a; color: #00ffcc; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; display: inline-block; margin: 0 5px 25px 5px; border: 1px solid #00ffcc; }
    </style>
</head>
<body>

    <!-- Box PIN de Sécurité -->
    <div id="pinBox" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f15; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <h2 style="color: #00ffcc;">Veuillez entrer le code PIN</h2>
        <p style="color: #aaa;">Valide pendant 5 jours.</p>
        <input type="password" id="pinInput" placeholder="PIN..." style="padding: 12px; font-size: 16px; border-radius: 8px; text-align: center; margin-bottom: 15px;">
        <button onclick="verifierPIN()">Valider</button>
        <p id="pinErreur" style="color: #ff3333; margin-top: 10px;"></p>
    </div>

    <h1>Géomancie Ramli</h1>
    
    <div class="nav-links">
        <a href="index.html">Wolof</a>
        <a href="arabic.html">العربية</a>
    </div>

    <br><button onclick="toggRamli()">Lancer le Tirage</button>

    <div class="grid" id="ramliGrid"></div>

    <div class="atte-box" id="atteBox" style="display:none;">
        <div class="atte-header">Interprétation Globale du Thème</div>
        <div class="atte-text" id="atteTexte"></div>
    </div>

    <script>
        const KODD_PIN_DEGGU = "1234"; 

        window.onload = function() {
            let pinDencu = localStorage.getItem("ramli_pin");
            let dateDencu = localStorage.getItem("ramli_pin_date");
            if (pinDencu === KODD_PIN_DEGGU && dateDencu) {
                let dateLeegi = new Date().getTime();
                let coonoFan = (dateLeegi - parseInt(dateDencu)) / (1000 * 60 * 60 * 24);
                if (coonoFan < 5) {
                    document.getElementById("pinBox").style.display = "none";
                } else {
                    localStorage.clear();
                    alert("PIN expiré après 5 jours !");
                }
            }
        };

        function verifierPIN() {
            let valueInput = document.getElementById("pinInput").value;
            if (valueInput === KODD_PIN_DEGGU) {
                localStorage.setItem("ramli_pin", valueInput);
                localStorage.setItem("ramli_pin_date", new Date().getTime().toString());
                document.getElementById("pinBox").style.display = "none";
            } else {
                document.getElementById("pinErreur").innerText = "PIN incorrect !";
            }
        }

        // Firi yu yaatu te tolloo pékke ak wolof ak araab bi
        const firi_atte = {
            "1,1,2,1": { 
                tur: "Yusuf", 
                xew: "Indique l'entrée imminente d'une bénédiction financière ou d'un soutien spirituel secret et très fort. Vos affaires matérielles vont s'améliorer nettement dans les jours à venir." 
            },
            "1,2,2,2": { 
                tur: "Adama", 
                xew: "Signifie un grand prestige, l'élévation sociale, une autorité durable et l'obtention d'un pouvoir ou d'un honneur important. C'est un signe de succès total et pérenne." 
            },
            "2,1,1,1": { 
                tur: "Muhammad", 
                xew: "Représente une affaire cachée de nature positive, des secrets bien gardés ou une joie intérieure profonde qui va durer longtemps. Ce qui est caché est protégé par la grâce divine." 
            },
            "2,2,1,2": { 
                tur: "Idris", 
                xew: "Annonce une grande force physique et spirituelle, une stabilité inébranlable et une protection divine rigoureuse sur tous vos projets. Idéal pour surmonter les obstacles actuels." 
            },
            "1,1,1,1": { 
                tur: "Ibrahim", 
                xew: "L'affaire se débloque par un mouvement rapide. Indique des opportunités de voyage, un déplacement important ou l'ouverture imminente de nouvelles voies bénéfiques pour votre avenir." 
            },
            "1,2,1,2": { 
                tur: "Issa", xew: "Promet des rires, de grands moments de bonheur et un soulagement immédiat de l'esprit. Cette figure dissipe tous les soucis accumulés et apporte le bien-être." 
            },
            "2,1,2,2": { 
                tur: "Oumar", 
                xew: "Révèle une vérité mystérieuse encore voilée mais absolument sincère. Il est fortement recommandé de patienter et de faire preuve de sagesse jusqu'à sa pleine révélation." 
            },
            "2,2,2,1": { 
                tur: "Ayouba", 
                xew: "Indique un recul temporaire, une épreuve de patience ou un blocage passager de vos projets. Face à cette situation lourde pour le cœur, la résilience et les prières sont nécessaires." 
            },
            "1,1,2,2": { 
                tur: "Jibriil", 
                xew: "Annonce une réunion très bénéfique, la conclusion d'un accord important, ou l'union harmonieuse de deux personnes par le mariage. Les énergies se rassemblent pour le bien." 
            },
            "1,2,2,1": { 
                tur: "Souleymane", 
                xew: "Amène une paix totale, la clarté d'esprit et une grande pureté du cœur. Tout se déroule de façon fluide, juste et légitime. Signe d'harmonie totale." 
            },
            "2,1,1,2": { 
                tur: "Aliou", 
                xew: "Alerte sur une forte tension émotionnelle, un risque de dispute intense ou d'affrontement difficile. Vous devez impérativement faire preuve de prudence et maîtriser votre colère." 
            },
            "2,2,1,1": { 
                tur: "Nouhou", 
                xew: "Signale un lourd fardeau intérieur, un blocage difficile ou une profonde tristesse de l'esprit. L'affaire est complexe et demande des prières et des sacrifices spirituels." 
            },
            "1,1,1,2": { 
                tur: "Hasan", 
                xew: "Évoque de la fatigue générale, des pertes matérielles ou des paroles confuses et contradictoires autour de vous. Soyez extrêmement vigilant pour protéger vos intérêts." 
            },
            "1,2,1,1": { 
                tur: "Yunus", 
                xew: "Annonce une victoire éclatante sur les épreuves, un gain matériel certain et une délivrance définitive de tous vos problèmes actuels. Le triomphe est assuré." 
            },
            "2,1,2,1": { 
                tur: "Ousmane", 
                xew: "Révèle un obstacle flou, une coupure soudaine ou une incertitude majeure entre vous et l'objet de vos désirs. L'affaire manque de clarté pour le moment." 
            },
            "2,2,2,2": { 
                tur: "Moussa", 
                xew: "Les gens se rassemblent en grand nombre autour de votre question. L'affaire s'étend de manière considérable mais comporte un risque d'agitation et de grande confusion." 
            }
        };

        function rëddRandom() { return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1]; }
        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }
        function fusionner(f1, f2) { return [booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2)]; }

        function toggRamli() {
            let m = []; 
            for (let i=0; i<4; i++) m.push(rëddRandom());
            
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);
            m.push([m, m, m, m]);

            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));

            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));

            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';
            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let name = firi_atte[cle]?.tur || "Inconnu";
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");
                grid.innerHTML += `<div class="kër"><div class="kër-tur">Maison ${i+1}</div><div class="tomb-yi">${visuel}</div><div class="mbindeef-tur">${name}</div></div>`;
            });
