<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli - Xatím ci Baaram</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        .zone-tomb { background: #1e1e1e; border: 2px dashed #4CAF50; padding: 30px 10px; margin: 15px auto; max-width: 400px; border-radius: 8px; cursor: pointer; }
        .zone-tomb:active { background: #252525; }
        .grid-mmaam { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 15px auto; }
        .mmaam-box { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #444; min-height: 120px; }
        .bet-tomb { font-size: 24px; color: #ffeb3b; letter-spacing: 3px; line-height: 1.2; font-weight: bold; margin-top: 5px; }
        .grid-16 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 25px; }
        .box-16 { background: #252525; padding: 10px; border-radius: 5px; border: 1px solid #555; }
        .bet-16 { font-size: 20px; color: #ffeb3b; letter-spacing: 3px; line-height: 1; margin: 5px 0; }
    </style>
</head>
<body>

    <h2>Ramli - Xatím ci Baaram</h2>
    <p id="status" style="color: #ff9800; font-weight: bold;">Cuqal ci boyet bu mbeex bi ci sufe 16 yoon ngir xatím 4 mmaam yi</p>

    <!-- Fi ngay bësé sa baaram ngir tomb -->
    <div class="zone-tomb" onclick="tombCiBaaram()">
        <b style="font-size: 18px; color: #4CAF50;">CUQAL FII CI SA BAARAM NGIR TOMB</b><br>
        <small style="color: #aaa;">Sa su nekk nga cuqé, bët yi dañuy xatímu</small>
    </div>

    <!-- Fi 4 mmaam yi di gusee -->
    <div class="grid-mmaam">
        <div class="mmaam-box"><b>M1</b><div class="bet-tomb" id="b1"></div></div>
        <div class="mmaam-box"><b>M2</b><div class="bet-tomb" id="b2"></div></div>
        <div class="mmaam-box"><b>M3</b><div class="bet-tomb" id="b3"></div></div>
        <div class="mmaam-box"><b>M4</b><div class="bet-tomb" id="b4"></div></div>
    </div>

    <!-- Fi 16 kër yi di gusee su mu maté -->
    <div class="grid-16" id="res"></div>

    <script>
        const nom = {"1,2,1,1":"Janfa", "1,1,1,1":"Adama", "2,1,2,2":"Mahdi", "1,1,2,1":"Idriss"};
        const txt = {"Janfa":"Naxate walla tawat.", "Adama":"Barke ak am-am.", "Mahdi":"Teranga ak jamm.", "Idriss":"Xam-xam ak daraja."};

        let kuñuCuq = 0;
        let mmaamYi = [[], [], [], []];

        function boole(c1, c2) { return c1.map((v, i) => (v + c2[i]) % 2 === 0 ? 2 : 1); }

        function tombCiBaaram() {
            if (kuñuCuq >= 16) {
                // Su maté ba noppi, dila bësaatal bees
                kuñuCuq = 0; mmaamYi = [[], [], [], []];
                for(let i=1; i<=4; i++) document.getElementById('b'+i).innerHTML = "";
                document.getElementById('res').innerHTML = "";
            }

            // Di jël poñ bu woor (1 walla 2) ci saa su nekk nga cuqé ci sa baaram
            let p = Math.floor(Math.random() * 2) + 1;
            
            // Tàbbal ko ci mmaam bi mu jàdd
            let indexMmaam = Math.floor(kuñuCuq / 4);
            mmaamYi[indexMmaam].push(p);
            kuñuCuq++;

            // Wone bët yi ci boyet bi mu yem
            let numMmaam = indexMmaam + 1;
            document.getElementById('b' + numMmaam).innerHTML = mmaamYi[indexMmaam].map(v => v === 1 ? "•" : "••").join("<br>");

            document.getElementById('status').innerText = "Cuq nga " + kuñuCuq + " yoon ci sa baaram.";

            // Su 16 cuq yi maté dëgg-dëgg, mu calculé téere bi yëpp
            if (kuñuCuq === 16) {
                document.getElementById('status').innerText = "16 Kër yi soti naññi ci sa xatím bu baaram!";
                calculer16Ker(mmaamYi, mmaamYi, mmaamYi, mmaamYi);
            }
        }

        function calculer16Ker(m1, m2, m3, m4) {
            let t = [null, m1, m2, m3, m4];
            
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];

            t = boole(t, t); t = boole(t, t);
            t = boole(t, t); t = boole(t, t);

            t = boole(t, t); t = boole(t, t);

            t = boole(t, t);

            t = boole(t, t);

            let html = "";
            for(let i=1; i<=16; i++) {
                let n = nom[t[i].join(',')] || "Kër gu Bees";
                let f = txt[n] || "Mbirum kër gi baax na.";
                let b = t[i].map(p => p === 1 ? "•" : "••").join("<br>");
                html += `<div class="box-16"><b>Kër ${i}</b><br><span style="color:#ff9800">${n}</span><div class="bet-16">${b}</div><small>${f}</small></div>`;
            }
            document.getElementById('res').innerHTML = html;
        }
    </script>
</body>
</html>
