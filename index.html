<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - 16 Figures</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00ffcc; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .kër { background: #161622; padding: 15px; border-radius: 8px; border: 1px solid #2a2a3a; text-align: center; }
        .kër-tur { font-size: 12px; color: #ff9900; font-weight: bold; text-transform: uppercase; }
        .tomb-yi { font-size: 26px; letter-spacing: 6px; line-height: 1; color: #00ffcc; margin: 10px 0; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 14px; }
        
        .atte-gu-mujj-box { 
            background: linear-gradient(135deg, #1c1c3a, #161622); 
            border: 2px solid #00ffcc; 
            border-radius: 12px; 
            padding: 25px; 
            max-width: 1000px; 
            margin: 30px auto; 
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,255,204,0.15);
        }
        .atte-header { font-size: 20px; color: #00ffcc; font-weight: bold; border-bottom: 2px solid #2a2a3a; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .atte-text { font-size: 16px; line-height: 1.6; color: #ffffff; }
        .highlight { color: #ffcc00; font-weight: bold; }
        
        button { background: linear-gradient(135deg, #007644, #009955); color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,118,68,0.4); transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,118,68,0.6); }
    </style>
</head>
<body>

    <h1>Ramli Leeral</h1>
    <button onclick="toggRamli()">Lancer Tirage Bi (Tombée)</button>

    <div class="grid" id="ramliGrid"></div>

    <div class="atte-gu-mujj-box" id="atteBox" style="display:none;">
        <div class="atte-header">Àtte Gu Woor Gu Ramli Bi Joxe</div>
        <div class="atte-text" id="atteTexte"></div>
    </div>

    <script>
        const firi_atte = {
            "1,1,1,1": { tur: "Tariki", xew: "mbir mi day dox, am na tukki walla yoon wu féeñ, lu gaaw lay doon." },
            "2,2,2,2": { tur: "Damama", xew: "mbooloo dina ci dajalo, mbir mi dina yaatu lool waaye am na jaxaso." },
            "2,1,1,2": { tur: "Humra", xew: "tàngay xol, xare walla fitna dina ci am. Faww nga am jom te muur sa xel." },
            "1,2,2,1": { tur: "Bayada", xew: "jàmm gu mucc ayib, leer, ak xol bu set. Lu baax te neex dina féeñ ci sa dundu." },
            "1,2,1,1": { tur: "Nusra Al-Kharija", xew: "ganyé gu féeñ, ndàm, ak mbir mu guene ci jàfe-jàfe yi. Lu baax la." },
            "1,1,2,1": { tur: "Nusra Al-Dakhila", xew: "barke gu duggu, alal walla ndimmis gu laqu gu dëgër buy ñëw ci yaw." },
            "1,1,1,2": { tur: "Utba Al-Kharija", xew: "coono, sànku alal walla wax gu rëy guy tas mbir mi. Faww nga wattuku." },
            "2,1,1,1": { tur: "Utba Al-Dakhila", xew: "mbir mu teju, batin bu dëgër, walla mbegte mu laqu mu nara duren." },
            "2,2,1,1": { tur: "Kabd Al-Asad", xew: "jafe-jafe gu tar, tòj-tòj walla mettit buy tàkk ci biir. Da laaj ñaan." },
            "1,1,2,2": { tur: "Ijtima'a", xew: "ndaje mu baax, sëy, walla boole alal yu bari ngir liggéej bu am solo." },
            "2,2,2,1": { tur: "Ankis", xew: "daanu gu gaaw, jàfe-jàfe buy wadd, walla rëcc-rëcc ci sa yaakaar." },
            "1,2,2,2": { tur: "Akyan", xew: "nguur, daraja gu rëy, ak alal gu bari gu am barke te buy duren." },
            "1,2,1,2": { tur: "La hiyan", xew: "ree, fo, mbegte, ak ndaje mu neex mu lay dandi mbooleem coono yi." },
            "2,1,2,1": { tur: "Kousadj", xew: "gàkk-gàkk walla lu dog ci sa diggante ak li nga sàkku. Lu am lëndëm la." },
            "2,1,2,2": { tur: "Nakiw", xew: "mbiro kumpa bu lëndëm te dëggu, faww nga sàytulu bu baax ba mu féeñ." },
            "2,2,1,2": { tur: "Asbo", xew: "doles gu rëy, mbindeef gu dëgër, ak nguur gu lay dimbali ci sa yoon." }
        };

        function rëddRandom() { return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1]; }
        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }
        
        function fusionner(f1, f2) { 
            return [
                booleLigne(f1[0], f2[0]), 
                booleLigne(f1[1], f2[1]), 
                booleLigne(f1[2], f2[2]), 
                booleLigne(f1[3], f2[3])
            ]; 
        }

        function toggRamli() {
            let m = [];
            
            // 1. Sàkku 4 Ndey yi (Kër 1 ba Kër 4) -> m[0] ba m[3]
            for (let i=0; i<4; i++) {
                m.push(rëddRandom());
            }
            
            // 2. Sàkku 4 Doom yi (Kër 5 ba Kër 8) -> m[4] ba m[7]
            m.push([m[0][0], m[1][0], m[2][0], m[3][0]]); // Kër 5 (Boppu Ndey yi)
            m.push([m[0][1], m[1][1], m[2][1], m[3][1]]); // Kër 6 (Dënnu Ndey yi)
            m.push([m[0][2], m[1][2], m[2][2], m[3][2]]); // Kër 7 (Biiru Ndey yi)
            m.push([m[0][3], m[1][3], m[2][3], m[3][3]]); // Kër 8 (Tànku Ndey yi)

            // 3. Sàkku Sët yi (Kër 9 ba Kër 12) -> m[8] ba m[11]
            m.push(fusionner(m[0], m[1])); // Kër 9 = K1 + K2
            m.push(fusionner(m[2], m[3])); // Kër 10 = K3 + K4
            m.push(fusionner(m[4], m[5])); // Kër 11 = K5 + K6
            m.push(fusionner(m[6], m[7])); // Kër 12 = K7 + K8

            // 4. Jeexal bi (Kër 13 ba Kër 16) -> m[12] ba m[15]
            m.push(fusionner(m[8], m[9]));   // Kër 13 = K9 + K10
            m.push(fusionner(m[10], m[11])); // Kër 14 = K11 + K12
            m.push(fusionner(m[12], m[13])); // Kër 15 = K13 + K14 (Misaan)
            m.push(fusionner(m[14], m[0]));  // Kër 16 = K15 + K1 (Àtte)

            // Display grid bu mat
            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';
            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let name = firi_atte[cle]?.tur || "Xamul";
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");
                grid.innerHTML += `<div class="kër"><div class="kër-tur">Kër ${i+1}</div><div class="tomb-yi">${visuel}</div><div class="mbindeef-tur">${name}</div></div>`;
            });

            // Jël firi kër yu dëggu yi ngir àtte bi
            let firiM1 = firi_atte[m[0].join(",")] || { tur: "Mbindeef", xew: "lu bir" };
            let firiM15 = firi_atte[m[14].join(",")] || { tur: "Mbindeef", xew: "lu am solo" };
            let firiM16 = firi_atte[m[15].join(",")] || { tur: "Mbindeef", xew: "lu jeex" };

            const texteAtte = `
                Ci seet gu mat seuk gi nga togg léegi: Yaw mi sàkku seet bi (Kër 1), sa yaram ak sa xel dafa tëdd ci mbindeefu <span class="highlight">${firiM1.tur}</span>. 
                Loolu dafa woné ne ci sa dundu léegi: ${firiM1.xew}<br><br>
                Ci àtte gu biir gu Misaan bi joxe (Kër 15) mu ngi féeñal mbindeefu <span class="highlight">${firiM15.tur}</span>, té loolu mu ngi lay won ne: 
                <span class="highlight">${firiM15.xew}</span><br><br>
                Kòdd gu mujj gi (Kër 16) mooy teju buntu seet bi, té dafa tàbblu mbindeefu <span class="highlight">${firiM16.tur}</span>. 
                Lii moodi tënk gu woor gu mbir mi di jeexe: <span class="highlight">Mbir mi lépp mu ngi lëkkaloo ak ndax ${firiM16.xew}</span>.
            `;

            document.getElementById('atteTexte').innerHTML = texteAtte;
            document.getElementById('atteBox').style.display = 'block';
        }
    </script>
</body>
</html>
