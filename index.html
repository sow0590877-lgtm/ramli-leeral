<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - Sa Turi Yonent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #ffcc00; margin-bottom: 20px; }
        .instruction {
            color: #cccccc;
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; color: #ffcc00; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #ffcc00;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .action-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }
        .action-btn:hover { background: #e6b800; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
            border-left: 5px solid #ffcc00;
            text-align: left;
            display: none;
        }
        .house-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 5px;
            border-bottom: 1px solid #333;
        }
        .house-title { font-weight: bold; color: #ffcc00; }
        .code-preview { font-family: monospace; color: #00ffcc; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ramli Leeral</h1>
    <div class="instruction">
        Duggalal kod 4 Ndeyi Ramli yi (coow walla tomb yi, mel ni: 1 1 2 1 ngir Yuusufa) ngir mu kalkilar 16 kër yi yëpp automatiqam.
    </div>
    
    <div class="input-group">
        <label>Kër 1 (Nit ki ak dundam):</label>
        <input type="text" id="buntu1" placeholder="Misaal: 1 1 2 1">
    </div>
    <div class="input-group">
        <label>Kër 2 (Alal ak koom-koom):</label>
        <input type="text" id="buntu2" placeholder="Misaal: 1 2 2 2">
    </div>
    <div class="input-group">
        <label>Kër 3 (Mbokk ak gox-goxaan):</label>
        <input type="text" id="buntu3" placeholder="Misaal: 2 1 1 1">
    </div>
    <div class="input-group">
        <label>Kër 4 (Kër, ndey ak baay):</label>
        <input type="text" id="buntu4" placeholder="Misaal: 2 2 1 2">
    </div>

    <button class="action-btn" onclick="firiMbirYëpp()">Firi 16 Kër Yi</button>

    <div id="resultat" class="result-box"></div>
</div>

<script>
// 1. Dencukaayóŋ firi 16 figiir yi ci Ramli
const ramliData = {
    "1 1 2 1": { name: "Yuusufa", desc: "Xéewal buy tàbbi, muus, ak yaakar bu baax. Ndam bu gaaw." },
    "1 2 2 2": { name: "Adama", desc: "Suuf, dëgëray, alal buy yàgg. Faaw nga muñ te dëgër." },
    "2 1 1 1": { name: "Muhammad", desc: "Sellal, njub, ngor, ak teddanga ci mbooloo. Jàmm saa su ne." },
    "2 2 1 2": { name: "Idriis", desc: "Mbir mu wàcc, nattu buy joxe léson, jàqare buy gaawra génn." },
    "1 1 1 1": { name: "Ibrahima", desc: "Mbooloo, dajalo, taxawal mbir mu rëy ak ndimbalu nit ñi." },
    "1 2 1 2": { name: "Hiisaa", desc: "Weex, sell xol, jàmm gu rëy, ak xool bu sedd ci dundu nit ki." },
    "2 1 2 2": { name: "Oumar", desc: "Fitna, xonq, fit bu rëy, xare walla mer bu gaaw. Sàytu ko." },
    "2 2 2 1": { name: "Ayyuuba", desc: "Tukki, génn, alal walla mbir buy rëcc mbaa buy tàggoo." },
    "1 1 2 2": { name: "Jibriil", desc: "Yoon buy dox, tukki, soppiku, walla xalaat buy rëy ci yoon." },
    "1 2 2 1": { name: "Solayman", desc: "Laxas, alal buy génn loxo bu gaaw, mbaa jàqare gu gàtt." },
    "2 1 1 2": { name: "Haliyyu", desc: "Teye alal, sàmm mbir ci biir kër, mbaa soxla su faju ci jàmm." },
    "2 2 1 1": { name: "Nuuhu", desc: "Daje, mbooloo, liggéey bu rëy buy taxaw ci njubte." },
    "1 1 1 2": { name: "Hasan", desc: "Ndam buy dugsi, barke, ak mbegte gu gaaw ci dundu njabot." },
    "1 2 1 1": { name: "Yunus", desc: "Siw, daraja, tudd bu rafet, ak bëgg joxe ndimbal mbooloo." },
    "2 1 2 1": { name: "Ousmane", desc: "Mbir mu dëgërut (diggante), faaw nga sàytu sa dund ak say xarit." },
    "2 2 2 2": { name: "Muusaa", desc: "Yoon bu tëju, fula bu rëy, coono buy joxe ndam bu dëgër." }
};

// 2. Turu 16 kër yi ci làmmiñu Wolof
const houseNames = {
    1: "Kër 1 (Nit ki ak dundam)",
    2: "Kër 2 (Alal ak koom-koom)",
    3: "Kër 3 (Mbokk ak gox-goxaan)",
    4: "Kër 4 (Kër, ndey ak baay)",
    5: "Kër 5 (Dom ak mbegte)",
    6: "Kër 6 (Tawat ak coono)",
    7: "Kër 7 (Sey ak liggéeyandoo)",
    8: "Kër 8 (Dee ak gaawu/lu nexut)",
    9: "Kër 9 (Tukki ak xam-xam)",
    10: "Kër 10 (Ngur ak daraja)",
    11: "Kër 11 (Yaakar ak xarit)",
    12: "Kër 12 (Noon ak gàllankoor)",
    13: "Kër 13 (Kër gi dëkk walla firi mbind mi)",
    14: "Kër 14 (Li buy dikk suba)",
    15: "Kër 15 (Mîzaan / Attekat bi)",
    16: "Kër 16 (Dëgg gu magg gu mujj)"
};

// 3. Sàrtu boole ponk yi (1 mooy dott, 2 mooy rëdd)
function boolePonk(p1, p2) {
    return (p1 + p2) % 2 === 0 ? 2 : 1;
}

// 4. Funksoŋ biiy kalkilar 16 kër yi
function firiMbirYëpp() {
    let parseInput = id => document.getElementById(id).value.trim().split(/\s+/).map(Number);
    
    let k1 = parseInput('buntu1');
    let k2 = parseInput('buntu2');
    let k3 = parseInput('buntu3');
    let k4 = parseInput('buntu4');

    if (k1.length !== 4 || k2.length !== 4 || k3.length !== 4 || k4.length !== 4) {
        alert("Am na njuumte! Faaw nga duggal 4 ponk (misaal: 1 1 2 1) ci kër bu nekk.");
        return;
    }

    let ker = [];
    ker[1] = k1;
    ker[2] = k2;
    ker[3] = k3;
    ker[4] = k4;

    // Sàkk Doom yi (Kër 5 ba 8)
    ker[5] = [k1[0], k2[0], k3[0], k4[0]];
    ker[6] = [k1[1], k2[1], k3[1], k4[1]];
    ker[7] = [k1[2], k2[2], k3[2], k4[2]];
    ker[8] = [k1[3], k2[3], k3[3], k4[3]];

    // Sàkk Set-frere yi (Kër 9 ba 12)
    ker[9]  = [boolePonk(ker[1][0], ker[2][0]), boolePonk(ker[1][1], ker[2][1]), boolePonk(ker[1][2], ker[2][2]), boolePonk(ker[1][3], ker[2][3])];
    ker[10] = [boolePonk(ker[3][0], ker[4][0]), boolePonk(ker[3][1], ker[4][1]), boolePonk(ker[3][2], ker[4][2]), boolePonk(ker[3][3], ker[4][3])];
    ker[11] = [boolePonk(ker[5][0], ker[6][0]), boolePonk(ker[5][1], ker[6][1]), boolePonk(ker[5][2], ker[6][2]), boolePonk(ker[5][3], ker[6][3])];
    ker[12] = [boolePonk(ker[7][0], ker[8][0]), boolePonk(ker[7][1], ker[8][1]), boolePonk(ker[7][2], ker[8][2]), boolePonk(ker[7][3], ker[8][3])];

    // Sàkk Seere ak Attekat (Kër 13 ba 15)
    ker[13] = [boolePonk(ker[9][0], ker[10][0]), boolePonk(ker[9][1], ker[10][1]), boolePonk(ker[9][2], ker[10][2]), boolePonk(ker[9][3], ker[10][3])];
    ker[14] = [boolePonk(ker[11][0], ker[12][0]), boolePonk(ker[11][1], ker[12][1]), boolePonk(ker[11][2], ker[12][2]), boolePonk(ker[11][3], ker[12][3])];
    ker[15] = [boolePonk(ker[13][0], ker[14][0]), boolePonk(ker[13][1], ker[14][1]), boolePonk(ker[13][2], ker[14][2]), boolePonk(ker[13][3], ker[14][3])];

    // Kër 16
    ker[16] = [boolePonk(ker[1][0], ker[15][0]), boolePonk(ker[1][1], ker[15][1]), boolePonk(ker[1][2], ker[15][2]), boolePonk(ker[1][3], ker[15][3])];

    // Wane firi bi ci ekraan bi
    let texthtml = "<h2>Resultat yu leer:</h2>";
    for (let i = 1; i <= 16; i++) {
        let kodFigiir = ker[i].join(" ");
        let firiBi = ramliData[kodFigiir] || { name: "Xamut", desc: "Mbir mu lëndëm tuuti." };
        let kerTuddu = houseNames[i];

        texthtml += `
            <div class="house-item">
                <span class="house-title">${kerTuddu}:</span> 
                <strong>${firiBi.name}</strong> <span class="code-preview">(${kodFigiir})</span><br>
                <span style="color: #cccccc; font-size: 14px;">${firiBi.desc}</span>
            </div>`;
    }

    const resBox = document.getElementById('resultat');
    resBox.innerHTML = texthtml;
    resBox.style.display = "block";
}
</script>

</body>
</html>
