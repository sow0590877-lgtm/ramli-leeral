            margin: 0;
        }
        h1 { color: #ffcc00; margin: 10px 0 5px 0; font-size: 22px; }
        .container {
            max-width: 100%;
            margin: auto;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .mother-input {
            margin: 8px 0;
            padding: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select {

            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 15px;
            width: 70%;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .jant-table {
            width: 100%;
            min-width: 550px;
            border-collapse: collapse;
            background: #ffffff;
            color: #000000;
            display: none;
        }
        .jant-table td {
            border: 1px solid #cccccc;
            text-align: center;
            vertical-align: middle;
            padding: 6px 2px;
        }
        .row-title {
            font-size: 10px;
            font-weight: bold;
            color: #555555;
            margin-bottom: 2px;
            display: block;
        }
        .fig-name {
            font-size: 9px;
            color: #2b7a78;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }
        .figure-dots {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.1;
            letter-spacing: 2px;
            color: #121212;
            display: inline-block;
        }
    </style>
</head>
