<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - 16 Mbindeef yu Mat</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00ffcc; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 25px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1100px; margin: 20px auto; }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
        .kër { background: #161622; padding: 20px; border-radius: 12px; border: 1px solid #2a2a3a; box-shadow: 0 6px 12px rgba(0,0,0,0.5); text-align: left; }
        .kër-tur { font-size: 14px; color: #ff9900; font-weight: bold; border-bottom: 1px solid #2a2a3a; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; text-align: center; }
        .tomb-yi { font-size: 32px; letter-spacing: 10px; line-height: 1; color: #00ffcc; text-align: center; margin: 15px 0; font-weight: bold; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 18px; text-align: center; margin-bottom: 10px; }
        .firi-box { background: #1c1c2e; padding: 10px; border-radius: 6px; font-size: 12px; line-height: 1.4; color: #b5b5c3; }
        .firi-item { margin-bottom: 6px; }
        .firi-item:last-child { margin-bottom: 0; }
        .label { font-weight: bold; color: #ffcc00; }
        button { background: linear-gradient(135deg, #007644, #009955); color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; margin-top: 10px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,118,68,0.4); transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,118,68,0.6); }
    </style>
</head>
<body>

    <h1>Ramli Leeral</h1>
    <div class="subtitle">Sàytoog 16 kër yi ak mbooleem firé yi ci Wolof</div>
    
    <button onclick="toggRamli()">Lancer Tirage Bi (Tombée)</button>

    <div class="grid" id="ramliGrid">
        <!-- 16 kër yi fi lañuy féeñ -->
    </div>

    <script>
        // Mbooleem firi gu mat ci suufu 16 mbindeef yi
        const dencu_mbindeef = {
            "1,1,1,1": { 
                tur: "Tariki (Al-Tariq)", 
                mana: "Yoon / Tukki",
                alal: "Xaalis buy guene walla buy tukki", 
                wér: "Gàww a wér, tànk yi laal", 
                mbir: "Mbir mu lay sànt dox walla tukki bu gaaw." 
            },
            "2,2,2,2": { 
                tur: "Damama (Al-Jama'ah)", 
                mana: "Mbooloo / Dajalo",
                alal: "Alal juko bari bokk, waaye du teye", 
                wér: "Febar buy yaatu ci yaram, xel mu bari xalaat", 
                mbir: "Dajalo nit ñu bari, ndaje mu am solo walla jaxaso." 
            },
            "2,1,1,2": { 
                tur: "Humra (Al-Humrah)", 
                mana: "Xonq / Xare",
                alal: "Ganyé xaalis ci coono walla xare", 
                wér: "Tàngay yaram, deret buy tàkk, coler", 
                mbir: "Xare walla bërré gu tar, tàngay xol ak doles." 
            },
            "1,2,2,1": { 
                tur: "Bayada (Al-Bayad)", 
                mana: "Weex / Leer",
                alal: "Alal gu set te am barke, lew dëgg", 
                wér: "Wér-gu-yaram gu mucc ayib, xol bu set", 
                mbir: "Jàmm gu dëggu, kumpa gu féeñ, ak mbegte mu mag." 
            },
            "1,2,1,1": { 
                tur: "Nusra Al-Kharija", 
                mana: "Ndimmis gu guene",
                alal: "Xaalis buy guene ngir jënd lu am solo", 
                wér: "Yaram buy doles, febar buy guene", 
                mbir: "Ndàm bu féeñ, ganyé ci kaw noon yi, mbaax." 
            },
            "1,1,2,1": { 
                tur: "Nusra Al-Dakhila", 
                mana: "Ndimmis gu duggu",
                alal: "Alal buy duggu ci kër gi, nganyé", 
                wér: "Wér gu dëgër, febar buy laqu ci biir", 
                mbir: "Barke gu duggu, am ndimmis lu bir, mbir mu baax." 
            },
            "1,1,1,2": { 
                tur: "Utba Al-Kharija", 
                mana: "Bunt bu guene",
                alal: "Xaalis buy sotti, sànku, walla reer", 
                wér: "Febar buy bir, coono gu rëy", 
                mbir: "Wax gu rëy gu guene, tas gu am, jaxaso." 
            },
            "2,1,1,1": { 
                tur: "Utba Al-Dakhila", 
                mana: "Bunt bu duggu",
                alal: "Alal jumu denc, mbeget mu teju", 
                wér: "Wér-gu-yaram gu laqu, coono gu teju", 
                mbir: "Mbir mu teju, batin bu dëgër, mbegte mu bir." 
            },
            "2,2,1,1": { 
                tur: "Kabd Al-Asad", 
                mana: "Biiru jenaas",
                alal: "Xaalis bu mu xoolé ci lëndëm, tas", 
                wér: "Biir buy métti, coono gu tar", 
                mbir: "Tàngay xol, jafe-jafe, walla tòj-tòj ci dundu." 
            },
            "1,1,2,2": { 
                tur: "Ijtima'a", 
                mana: "Ndaje / Sëy",
                alal: "Boole alal yu bari ngir liggéey", 
                wér: "Mbooloo febar, xel mu dajalo", 
                mbir: "Sëy mu am barke, ndaje mu baax, boole." 
            },
            "2,2,2,1": { 
                tur: "Ankis", 
                mana: "Tënku gu wadd",
                alal: "Alal buy wadd, jàfe-jàfe xaalis", 
                wér: "Febar buy wadd ci yaram, gàyc", 
                mbir: "Daanu gu gaaw, ndaxar lu mag, coono gu teju." 
            },
            "1,2,2,2": { 
                tur: "Akyan", 
                mana: "Alal gu bari",
                alal: "Alal gu mag, barke gu wër, nguur", 
                wér: "Wér-gu-yaram gu mucc ayib", 
                mbir: "Daraja gu rëy, nguur, ak yaakaar gu dëggu." 
            },
            "1,2,1,2": { 
                tur: "La hiyan", 
                mana: "Ree / Mbegte",
                alal: "Xaalis bu lay jox mbegte ak po", 
                wér: "Yaram mu mucc ayib, xel mu fo", 
                mbir: "Ree, kaf, mbegte mu rëy, ndaje mu neex." 
            },
            "2,1,2,1": { 
                tur: "Kousadj", 
                mana: "Gàkk-gàkk",
                alal: "Alal jumu dog, jàfe-jàfe gu ndaw", 
                wér: "Febar bu ndaw buy dagg", 
                mbir: "Gàkk-gàkk ci mbir, dogu gu dagg, lëndëm." 
            },
            "2,1,2,2": { 
                tur: "Nakiw", firi: "Kumpa",
                mana: "Lu lëndëm",
                alal: "Xaalis bumu xamul fi mu jóge", 
                wér: "Febar bumu xamul, kumpa", 
                mbir: "Mbiro kumpa lu bir, lu lëndëm te dëggu." 
            },
            "2,2,1,2": { 
                tur: "Asbo", 
                mana: "Doles / Mag",
                alal: "Alal ju dëgër te daggul", 
                wér: "Doles gu rëy ci yaram", 
                mbir: "Mbindeef gu rëy, doles gu mag, nguur." 
            }
        };

        const turu_kër_yi = [
            "Kër 1: Nit ki / Dundu gi", "Kër 2: Alal / Xaalis", "Kër 3: Bokk / Deggandoo", "Kër 4: Kër / Maam",
            "Kër 5: Dom / Mbegte", "Kër 6: Febar / Liggéey", "Kër 7: Sëy / Sope", "Kër 8: Gaawu / Kumpa",
            "Kër 9: Tukki / Diine", "Kër 10: Nguur / Daraja", "Kër 11: Yaakaar / Xarit", "Kër 12: Noon / Rëb",
            "Kër 13: Sàkkukat", "Kër 14: Lu ñuy sàkku", "Kër 15: Misaan bi (Juge)", "Kër 16: Àtte gu mujj"
        ];

        function rëddRandom() {
            return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1];
        }

        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }

        function fusionner(f1, f2) {
            return [booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2), booleLigne(f1, f2)];
        }

        function toggRamli() {
            let m = [];
            for (let i=0; i<4; i++) m.push(rëddRandom());
            for (let i=0; i<4; i++) m.push([m[i], m[i], m[i], m[i]]);
            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));
            m.push(fusionner(m, m)); m.push(fusionner(m, m));

            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';

            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let info = dencu_mbindeef[cle] || { tur: "Xamul", mana: "-", alal: "-", wér: "-", mbir: "-" };
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");

                let d = document.createElement('div');
                d.className = 'kër';
                d.innerHTML = `
                    <div class="kër-tur">${turu_kër_yi[i]}</div>
                    <div class="tomb-yi">${visuel}</div>
                    <div class="mbindeef-tur">${info.tur}</div>
                    <div class="firi-box">
                        <div class="firi-item"><span class="label">Tekki:</span> ${info.mana}</div>
                        <div class="firi-item"><span class="label">Alal:</span> ${info.alal}</div>
                        <div class="firi-item"><span class="label">Wér:</span> ${info.wér}</div>
                        <div class="firi-item"><span class="label">Mbir:</span> ${info.mbir}</div>
                    </div>
                `;
                grid.appendChild(d);
            });
        }
    </script>
</body>
</html>
