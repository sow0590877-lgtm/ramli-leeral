<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - Ndeyi Ramli</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #ffcc00; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; color: #ffcc00; }
        input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #ffcc00;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #e6b800; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-left: 5px solid #ffcc00;
            border-radius: 5px;
            text-align: left;
            display: none;
        }
        .house-title { font-weight: bold; color: #ffcc00; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ramli Leeral</h1>
    <p>Duggalal kod 4 Ndeyi Ramli yi (coow walla tomb yi, mel ni: 1 1 2 1)</p>
    
    <div class="input-group">
        <label>Buntu 1 (Nit ki ak dundam):</label>
        <input type="text" id="buntu1" placeholder="Mel ni: 1 1 2 1">
    </div>
    <div class="input-group">
        <label>Buntu 2 (Alal ak koom-koom):</label>
        <input type="text" id="buntu2" placeholder="Mel ni: 1 2 2 2">
    </div>
    <div class="input-group">
        <label>Buntu 3 (Mbokk ak gox):</label>
        <input type="text" id="buntu3" placeholder="Mel ni: 2 1 1 1">
    </div>
    <div class="input-group">
        <label>Buntu 4 (Kër, ndey ak baay):</label>
        <input type="text" id="buntu4" placeholder="Mel ni: 2 2 1 2">
    </div>

    <button onclick="firiRamli()">Firi Mbir Mi</button>

    <div id="resultat" class="result-box"></div>
</div>

<script>
const ramliData = {
    "1 1 2 1": { name: "Yuusufa", m1: "Nit ku muus, ku am yaakar, te xéewal di ko dikkal ci dundam.", m2: "Alal buy dugsi bu gaaw te am barke.", m3: "Mbokk walla xarit yu am muus te bëgg la.", m4: "Kër gu am xéewal, muus, te barkeel." },
    "1 2 2 2": { name: "Adama", m1: "Nit ku dëgër bopp, ku am fula, ku bëgg dëgg, te taxawu dundam.", m2: "Alal bu dëgër (lu mel ni kër walla suuf) buy yàgg.", m3: "Diggante gu dëgër te yàgg ak sa mbooloo.", m4: "Kër gu dëgër, baay walla ndey ku am fula." },
    "2 1 1 1": { name: "Muhammad", m1: "Nit ku am ngor, ku jor, ku am teddanga, te nit ñi bëgg ko lool.", m2: "Alal bu sell, bu ñu amé ci yoonu jàmm ak njub.", m3: "Mbokk yu sell, yu la amé teddanga ak njub.", m4: "Kër gu sell, gu am njub ak teddanga." },
    "2 2 1 2": { name: "Idriis", m1: "Nit ku am jàqare léegi, walla ku nekk ci nattu bu ko wara jox léison.", m2: "Wàccug alal walla coono ci wàllu xaalis léegi.", m3: "Jàqare walla naxari xool buy bawe ci mbokk.", m4: "Mbir mu wàcc walla coono ci biir kër." },
    "1 1 1 1": { name: "Ibrahima", m1: "Nit ku mbooloo sopp, ku yaatu xol, te am ndimbal ci nit ñi.", m2: "Xaalis buy dajalo walla alal buy bawe ci mbooloo.", m3: "Dajalo gu rëy ak say mbokk walla sa dëkk.", m4: "Kër gu dajale mbooloo mu bari saa su nekk." },
    "1 2 1 2": { name: "Hiisaa", m1: "Nit ku xool bu sedd am, ku sell xol, te am jàmm ci dundam.", m2: "Koom bu lér, bu amul njuumte, te buy joxe jàmm.", m3: "Jàmm gu rëy ak xool bu sedd ci sa diggante ak ñi la wër.", m4: "Jàmm, weex, ak xool bu sedd ci biir kër." },
    "2 1 2 2": { name: "Oumar", m1: "Nit ku am fit lool, ku gaaw a mer, te am raye ci li mu bëgg.", m2: "Alal bu ñu amé ci fitna walla coono gu rëy.", m3: "Xare, xuloo, walla fitna diggante mbokk.", m4: "Fitna, mer, walla xuloo ci biir kër." },
    "2 2 2 1": { name: "Ayyuuba", m1: "Nit ku bëgg tukki walla liggéey, waaye nag mu nekk ci coono buy génn.", m2: "Xaalis buy génn loxo walla koom buy rëcc léegi.", m3: "Tàggoo walla tukki bu lay soreal ak sa mbokk.", m4: "Génn kër walla tukki bu lay soreal ak sa dëkk." },
    "1 1 2 2": { name: "Jibriil", m1: "Nit ku bëgg soppiku, ku tàyel dëkk fenu rekk, te bëgg dox yoon.", m2: "Alal buy bawe ci tukki walla dox yoon.", m3: "Yoon walla dox buy am ci sa gox-goxaan.", m4: "Yoon walla soppiku buy am ci sa biir kër." },
    "1 2 2 1": { name: "Solayman", m1: "Nit ku laxas, ku am lu mu bëgg génne ci loxoom mbaa ku jàq lool.", m2: "Xaalis buy génn bu gaaw (tasu alal).", m3: "Tasu walla soreyante ak say mbokk.", m4: "Alal buy génn kër walla tasug mbir." },
    "2 1 1 2": { name: "Haliyyu", m1: "Nit ku beegg dëgër te dëgëral boppam, ku teye alal walla sàmm mbir.", m2: "Teye xaalis walla alal buy duggaat ci loxo.", m3: "Jappante ak teye diggante bu baax ak say xarit.", m4: "Teye alal walla soxla su faju ci biir kër." },
    "2 2 1 1": { name: "Nuuhu", m1: "Nit ku am njubte, ku sàmm diggante, te sopp mbooloo.", m2: "Koom buy dajalo ci liggéey bu rëy.", m3: "Daje walla taxawal liggéey bu rëy ak say mbokk.", m4: "Mbooloo wallay liggéey bu mag buy taxaw ci kër gi." },
    "1 1 1 2": { name: "Hasan", m1: "Nit ku am barke ak mbegte gu gaaw ci dundam.", m2: "Xéewal ak xaalis bu gaaw a tàbbi ci loxo.", m3: "Mbegte ak barke buy bawe ci sa gox.", m4: "Barke ak mbegte gu rëy ci sa njabot." },
    "1 2 1 1": { name: "Yunus", m1: "Nit ku siw, ku am daraja, te bëgg joxe ndimbal.", m2: "Alal buy yaatu te di siwal nit ki.", m3: "Daraja ak tudd bu rafet ci sa biir mbooloo.", m4: "Kër gu siw te rafet tudd ci gox bi." },
    "2 1 2 1": { name: "Ousmane", m1: "Nit ku nekk ci diggante (lu nekk sàytu dundam), am na yaakar yu bari.", m2: "Koom bu dëgërut, faaw nga sàytu ko bu baax.", m3: "Diggante gu dëgërut, faaw nga sàytu say xarit.", m4: "Mbir mu tëju-ubbeeku, faaw nga sàytu sa kër." },
    "2 2 2 2": { name: "Muusaa", m1: "Nit ku am fula lool, ku nekk ci yoon wu am coono waaye mu dëgër.", m2: "Koom bu tëju léegi waaye buy ubbeeku ci coono bu yàgg.", m3: "Yoon bu tëju mbaa coono ci wàllu diggante gox-goxaan.", m4: "Kër gu dëgër bopp waaye gu am coono yu bari." }
};

function firiRamli() {
    const b1 = document.getElementById('buntu1').value.trim();
    const b2 = document.getElementById('buntu2').value.trim();
    const b3 = document.getElementById('buntu3').value.trim();
    const b4 = document.getElementById('buntu4').value.trim();

    let texthtml = "<h2>Resultat yu leer:</h2>";
    
    if(ramliData[b1]) texthtml += `<div class="house-title">Buntu 1 (${ramliData[b1].name}):</div><div>${ramliData[b1].m1}</div>`;
    if(ramliData[b2]) texthtml += `<div class="house-title">Buntu 2 (${ramliData[b2].name}):</div><div>${ramliData[b2].m2}</div>`;
    if(ramliData[b3]) texthtml += `<div class="house-title">Buntu 3 (${ramliData[b3].name}):</div><div>${ramliData[b3].m3}</div>`;
    if(ramliData[b4]) texthtml += `<div class="house-title">Buntu 4 (${ramliData[b4].name}):</div><div>${ramliData[b4].m4}</div>`;

    const resBox = document.getElementById('resultat');
    resBox.innerHTML = texthtml;
    resBox.style.display = "block";
}
</script>

</body>
</html>
