<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - Sa Turi Yonent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #ffcc00; margin-bottom: 20px; }
        .container {
            max-width: 500px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .instruction {
            color: #cccccc;
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        /* Style barigo yu ñuy bës */
        .figure-builder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .row-btn {
            background: #2a2a2a;
            border: 2px solid #ffcc00;
            color: #ffcc00;
            width: 120px;
            padding: 10px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .row-btn:hover {
            background: #ffcc00;
            color: #000;
        }
        .action-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .action-btn:hover { background: #e6b800; }
        /* Style u bbarigo ndam li */
        #resultat {
            margin-top: 25px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 5px;
            border-left: 5px solid #ffcc00;
            display: none;
            text-align: left;
        }
        #resultat h2 { color: #ffcc00; margin-top: 0; font-size: 20px; }
        #resultat p { color: #e0e0e0; line-height: 1.5; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ramli Leeral</h1>
    <p class="instruction">Bësal ci barigo yi ngir tànn 1 walla 2i ponk ngir sàkk sa figure :</p>

    <!-- Zone bu ñuy bës ngir toggu figure bi -->
    <div class="figure-builder">
        <button class="row-btn" id="l1" onclick="changerLigne('l1')">*</button>
        <button class="row-btn" id="l2" onclick="changerLigne('l2')">*</button>
        <button class="row-btn" id="l3" onclick="changerLigne('l3')">*</button>
        <button class="row-btn" id="l4" onclick="changerLigne('l4')">*</button>
    </div>

    <button class="action-btn" onclick="interpreterRamli()">Firi Figure Bi</button>

    <!-- Fii la firi gi di genné -->
    <div id="resultat">
        <h2 id="fig-nom"></h2>
        <p id="fig-firi"></p>
    </div>
</div>

<script>
// Dictionnaire u 16 figure yi ci Wolof
const dictionnaireRamli = {
    "1111": { nom: "Youssof (Yoon)", firi: "Yoon bu uwwu, tukki bu hëw, doxalin, walla yoonu jamm bu ubbeeku." },
    "2222": { nom: "Adama (Mbooloo)", firi: "Mbooloo mu dajalo, jëmm, rati rati, walla dund gu rafet ci biir nit ñi." },
    "1122": { nom: "Mahdiou (Alal)", firi: "Alal, ngàariñ, barke, ak koom-koom bu bees bu lay dikal." },
    "2211": { nom: "Idriss (Am / Ndariñ)", firi: "Ligéey bu am solo, ndam, walla li nga doon wut mu ngi lay jox njariñ." },
    "1211": { nom: "Ibrahim (Mbégte)", firi: "Mbégte, jamm, xew-xew bu neex, ak wërsëg bu lëw." },
    "1121": { nom: "Issa (Ñàkk / Rëcc)", firi: "Genn ñàkk walla rëcc-rëcc, faww nga saytu sa bopp ci wàllu dépense." },
    "2122": { nom: "Oumar (Xonq / Fit)", firi: "Fit, xare, kàttan, walla col bu tàng. Dafa laaj tàyyeel ak reesal." },
    "2212": { nom: "Ayoub (Naqar)", firi: "Metit, xel bu tiis, walla xaar gu yàgg. Ligéey bu laaj muñ." },
    "1221": { nom: "Lomara (Biir / Suttura)", firi: "Teju, biir, suttura, walla mbir mu fuyu mu nekk ci suttura." },
    "2112": { nom: "Abdoullah (Daje)", firi: "Daje bu am solo, wetu, walla waxtaan bu nuy jëme kanam." },
    "1112": { nom: "Aliou (Lëkkalé / Sey)", firi: "Sey, lëkkalé, ligéeyandoo, walla diggante ñaari nit yu baax." },
    "2111": { nom: "Nohou (Taxaw / Jagat)", firi: "Mbir mu taxaw, rëcc-rëcc bu laaj njaatige walla kilifa gu lay jàppale." },
    "1212": { nom: "Ousmane (Set / Jamm)", firi: "Xel bu dal, xol bu set, jamm, ak selaat ci li ngay def." },
    "2121": { nom: "Slemane (Tawat / Coona)", firi: "Coona, tawat, walla nattu bu ndaw. Dafa laaj nga noci sa bopp." },
    "1222": { nom: "Moussa (Kàddu / Kaddou)", firi: "Kàddu yu am solo, tàggat, wax gu rëy walla xabar buy dikk." },
    "2221": { nom: "Younous (Ndam)", firi: "Ndam bu mag, sargal, teddungal, ak lëf bu neex buy sotti." }
};

// Fonction buy soppi ponk yi (* walla **)
function changerLigne(id) {
    const btn = document.getElementById(id);
    if (btn.innerText === "*") {
        btn.innerText = "**";
    } else {
        btn.innerText = "*";
    }
}

// Fonction buy kalkilé tey firi
function interpreterRamli() {
    let code = "";
    
    // Xool li nekk ci 4i ligne yi
    for (let i = 1; i <= 4; i++) {
        const val = document.getElementById("l" + i).innerText;
        code += (val === "*") ? "1" : "2";
    }
    
    // Gëstu ci dictionnaire bi
    const figure = dictionnaireRamli[code];
    const blocResultat = document.getElementById("resultat");
    
    if (figure) {
        document.getElementById("fig-nom").innerText = figure.nom;
        document.getElementById("fig-firi").innerText = figure.firi;
        blocResultat.style.display = "block";
    } else {
        document.getElementById("fig-nom").innerText = "Njuumte !";
        document.getElementById("fig-firi").innerText = "Figure bi dëppowul ak li am. Saytul ponk yi.";
        blocResultat.style.display = "block";
    }
}
</script>

</body>
</html>
