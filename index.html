    <script>
        function addFigures(f1, f2) {
            let result = [];
            for (let i = 0; i < 4; i++) {
                let sum = Number(f1[i]) + Number(f2[i]);
                result.push(sum % 2 === 0 ? 2 : 1);
            }
            return result;
        }

        function formatVerticalDots(arr) {
            return arr.map(num => num === 1 ? "●" : "● ●").join("<br>");
        }
