<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - Set Wecc</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #ffcc00; margin-bottom: 5px; }
        h2 { color: #aaaaaa; font-size: 16px; font-weight: normal; margin-top: 0; }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .mother-input {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        label { font-weight: bold; }
        select {
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 16px;
            width: 65%;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        button:hover { background: #e6b800; }
        .result-box {
            margin-top: 30px;
            text-align: left;
            background: #252525;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .house-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            align-items: center;
        }
        .dots {
            font-weight: bold;
            letter-spacing: 3px;
            color: #ffcc00;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>🔮 Ramli Leeral</h1>
    <h2>Mbooleem 16 Figiir yi mat sëkk</h2>
    
    <div class="container">
        <h3>Tànnal 4 Ndiy yi</h3>
        
        <div class="mother-input">
            <label>Kër 1 :</label>
            <select id="m1">
                <option value="1,1,2,1">Solaymaan</option>
                <option value="2,1,1,1">Ayyuub</option>
                <option value="1,2,1,2">Muhammad</option>
                <option value="2,2,1,1">Yuusufa</option>
                <option value="2,1,1,2">Haliyyu / Ousmane</option>
                <option value="1,2,2,1">Lomara</option>
                <option value="1,1,1,1">Adama</option>
                <option value="2,2,2,2">Médi</option>
                <option value="1,1,2,2">Ibrahima</option>
                <option value="2,2,1,2">Missa</option>
                <option value="1,2,1,1">Insa</option>
                <option value="1,1,1,2">Trawore</option>
                <option value="2,1,1,1">Aliou</option>
                <option value="2,1,2,2">Seahu</option>
                <option value="1,2,2,2">Yunus</option>
                <option value="2,2,2,1">Omar</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 2 :</label>
            <select id="m2">
                <option value="2,1,1,1">Ayyuub</option>
                <option value="1,1,2,1">Solaymaan</option>
                <option value="1,2,1,2">Muhammad</option>
                <option value="2,2,1,1">Yuusufa</option>
                <option value="2,1,1,2">Haliyyu / Ousmane</option>
                <option value="1,2,2,1">Lomara</option>
                <option value="1,1,1,1">Adama</option>
                <option value="2,2,2,2">Médi</option>
                <option value="1,1,2,2">Ibrahima</option>
                <option value="2,2,1,2">Missa</option>
                <option value="1,2,1,1">Insa</option>
                <option value="1,1,1,2">Trawore</option>
                <option value="2,1,2,2">Seahu</option>
                <option value="1,2,2,2">Yunus</option>
                <option value="2,2,2,1">Omar</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 3 :</label>
            <select id="m3">
                <option value="1,2,1,2">Muhammad</option>
                <option value="1,1,2,1">Solaymaan</option>
                <option value="2,1,1,1">Ayyuub</option>
                <option value="2,2,1,1">Yuusufa</option>
                <option value="2,1,1,2">Haliyyu / Ousmane</option>
                <option value="1,2,2,1">Lomara</option>
                <option value="1,1,1,1">Adama</option>
                <option value="2,2,2,2">Médi</option>
                <option value="1,1,2,2">Ibrahima</option>
                <option value="2,2,1,2">Missa</option>
                <option value="1,2,1,1">Insa</option>
                <option value="1,1,1,2">Trawore</option>
                <option value="2,1,2,2">Seahu</option>
                <option value="1,2,2,2">Yunus</option>
                <option value="2,2,2,1">Omar</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 4 :</label>
            <select id="m4">
                <option value="2,2,1,1">Yuusufa</option>
                <option value="1,1,2,1">Solaymaan</option>
                <option value="2,1,1,1">Ayyuub</option>
                <option value="1,2,1,2">Muhammad</option>
                <option value="2,1,1,2">Haliyyu / Ousmane</option>
                <option value="1,2,2,1">Lomara</option>
                <option value="1,1,1,1">Adama</option>
                <option value="2,2,2,2">Médi</option>
                <option value="1,1,2,2">Ibrahima</option>
                <option value="2,2,1,2">Missa</option>
                <option value="1,2,1,1">Insa</option>
                <option value="1,1,1,2">Trawore</option>
                <option value="2,1,2,2">Seahu</option>
                <option value="1,2,2,2">Yunus</option>
                <option value="2,2,2,1">Omar</option>
            </select>
        </div>

        <button onclick="calculerRamli()">Boole Poñ yi</button>

        <div id="results" class="result-box">
            <h3 style="color: #ffcc00; text-align: center;">Gennayu Jant bi</h3>
            <div id="house-list"></div>
        </div>
    </div>

    <script>
        function addFigures(f1, f2) {
            let result = [];
            for (let i = 0; i < 4; i++) {
                let sum = f1[i] + f2[i];
                result.push(sum % 2 === 0 ? 2 : 1);
            }
            return result;
        }

        function formatDots(arr) {
            return arr.map(num => num === 1 ? "  o  " : "o  o").join(" | ");
        }

        function calculerRamli() {
            let m1 = document.getElementById("m1").value.split(",").map(Number);
            let m2 = document.getElementById("m2").value.split(",").map(Number);
            let m3 = document.getElementById("m3").value.split(",").map(Number);
            let m4 = document.getElementById("m4").value.split(",").map(Number);

            let h = {};
            h[1] = m1; h[2] = m2; h[3] = m3; h[4] = m4;

            h[5] = [m1[0], m2[0], m3[0], m4[0]];
            h[6] = [m1[1], m2[1], m3[1], m4[1]];
            h[7] = [m1[2], m2[2], m3[2], m4[2]];
            h[8] = [m1[3], m2[3], m3[3], m4[3]];

            h[9] = addFigures(h[1], h[2]);
            h[10] = addFigures(h[3], h[4]);
            h[11] = addFigures(h[5], h[6]);
            h[12] = addFigures(h[7], h[8]);

            h[13] = addFigures(h[9], h[10]);
            h[14] = addFigures(h[11], h[12]);
            h[15] = addFigures(h[13], h[14]);
            h[16] = addFigures(h[15], h[1]);

            let html = "";
            for (let i = 1; i <= 16; i++) {
                let bg = (i === 15) ? "background: #332b00; border: 1px solid #ffcc00;" : "";
                html += `<div class="house-item" style="padding: 10px; margin: 4px 0; border-radius: 4px; ${bg}">
                            <span style="font-weight:bold;">Kër ${i}</span>
                            <span class="dots">[ ${formatDots(h[i])} ]</span>
                         </div>`;
            }

            document.getElementById("house-list").innerHTML = html;
            document.getElementById("results").style.display = "block";
        }
    </script>
</body>
</html>
