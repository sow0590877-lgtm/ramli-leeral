<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - 16 Figures</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f15; color: #e0e0e6; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00ffcc; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .kër { background: #161622; padding: 15px; border-radius: 8px; border: 1px solid #2a2a3a; text-align: center; }
        .kër-tur { font-size: 12px; color: #ff9900; font-weight: bold; text-transform: uppercase; }
        .tomb-yi { font-size: 26px; letter-spacing: 6px; line-height: 1; color: #00ffcc; margin: 10px 0; }
        .mbindeef-tur { font-weight: bold; color: #ffffff; font-size: 16px; }
        
        .atte-gu-mujj-box { 
            background: linear-gradient(135deg, #1c1c3a, #161622); 
            border: 2px solid #00ffcc; 
            border-radius: 12px; 
            padding: 25px; 
            max-width: 1000px; 
            margin: 30px auto; 
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,255,204,0.15);
        }
        .atte-header { font-size: 20px; color: #00ffcc; font-weight: bold; border-bottom: 2px solid #2a2a3a; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .atte-text { font-size: 16px; line-height: 1.6; color: #ffffff; }
        .highlight { color: #ffcc00; font-weight: bold; }
        
        button { background: linear-gradient(135deg, #007644, #009955); color: white; border: none; padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,118,68,0.4); transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,118,68,0.6); }
    </style>
</head>
<body>

    <h1>Ramli Leeral</h1>
    <button onclick="toggRamli()">Lancer Tirage Bi (Tombée)</button>

    <div class="grid" id="ramliGrid"></div>

    <div class="atte-gu-mujj-box" id="atteBox" style="display:none;">
        <div class="atte-header">Àtte Gu Leer Gu Ramli Bi Joxe</div>
        <div class="atte-text" id="atteTexte"></div>
    </div>

    <script>
        const firi_atte = {
            "1,1,2,1": { tur: "Yusuf", nit_ki: "dafa am barke gu duggu, alal walla nganyé buy ñëw ci dundam.", xalaat: "mu ngi sàkku alal, denc barke, walla liggéej bu dëgër ci biir." },
            "1,2,2,2": { tur: "Adama", nit_ki: "dafa am daraja gu rëy, nguur, ak barke gu yaatu ci dundam.", xalaat: "mu ngi xalaat ci alal gu bari, daraja, walla nguur gu dëgër." },
            "2,1,1,1": { tur: "Muhammad", nit_ki: "dafa am mbir mu teju walla batin bu dëgër ci yaramam.", xalaat: "mu ngi xalaat ci lu teju, tënku mbir, walla mbegte mu bir." },
            "2,2,1,2": { tur: "Idris", nit_ki: "dafa am doles gu rëy, mbindeef gu dëgër ci yaramam.", xalaat: "mu ngi xalaat ci doles gu mag, nguur, walla ku koy dimbali." },
            "1,1,1,1": { tur: "Ibrahim", nit_ki: "dafa am yoon wu féeñ walla tukki bu rëy buy dox ci dundam léegi.", xalaat: "mu ngi tàbblu ci lu gaaw, bëgg a dagg yoon wu gatt walla tukki." },
            "1,2,1,2": { tur: "Issa", nit_ki: "dafa nekk ci po, ree, ak mbegte mu mag ci yaramam.", xalaat: "mu ngi xalaat ci kaf, fo, mbegte, ak ndaje mu neex mu koy dandi coono." },
            "2,1,2,2": { tur: "Oumar", nit_ki: "dafa nekk ci mbiro kumpa bu lëndëm te dëggu.", xalaat: "mu ngi xalaat ci kumpa, lu laqu, walla lu bët mënul a giss bu gaaw." },
            "2,2,2,1": { tur: "Ayouba", nit_ki: "dafa wadd ci yaakaar walla mu ngi duren coono gu tar.", xalaat: "mu ngi xalaat ci daanu, jàfe-jàfe buy wadd, walla rëcc-rëcc." },
            "1,1,2,2": { tur: "Jibriil", nit_ki: "dafa denc ndaje mu baax, sëy, walla lëkkaloo bu am solo.", xalaat: "mu ngi xalaat ci sëy, boole alal, walla lëkkaloo ak keneen." },
            "1,2,2,1": { tur: "Souleymane", nit_ki: "dafa am xol bu set, jàmm gu mucc ayib, ak muur gu baax.", xalaat: "mu ngi xalaat ci lu set, jàmm, leer, walla mbirum diine mu am barke." },
            "2,1,1,2": { tur: "Aliou", nit_ki: "dafa am tàngay xol, coler, walla mu ngi bërré ak jafe-jafe.", xalaat: "xalaatam dafa tàng, mu ngi denc fitna walla bëgg xare ngir ganyé." },
            "2,2,1,1": { tur: "Nouhou", nit_ki: "dafa nekk ci jafe-jafe gu tar, tòj-tòj walla mettit bu rëy.", xalaat: "xalaat bu lëndëm, tàngay biir, ak coono gu tar moo ko uor." },
            "1,1,1,2": { tur: "Hasan", nit_ki: "dafa nekk ci coono, sànku alal walla jaxaso bu rëy.", xalaat: "mu ngi xalaat ci wax gu rëy gu guene walla mbir mu koy tas xel." },
            "1,2,1,1": { tur: "Yunus", nit_ki: "dafa nekk ci ndàm, guene ci jàfe-jàfe te am doles.", xalaat: "mu ngi xalaat ci guene, féeñal ndàmam, walla dandi noon yi." },
            "2,1,2,1": { tur: "Ousmane", nit_ki: "dafa am gàkk-gàkk walla lu dog ci sa diggante ak li nga sàkku.", xalaat: "mu ngi xalaat ci lu dog, gàkk-gàkk ci mbir, walla lëndëm." },
            "2,2,2,2": { tur: "Moussa", nit_ki: "dafa jaxaso ci mbooloo walla mu ngi saytu mbir yu bari.", xalaat: "mu ngi xalaat ci ndaje, mbooloo, walla lu laal dajalo nit ñu bari." }
        };

        function rëddRandom() { return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1]; }
        function booleLigne(l1, l2) { return ((l1 + l2) % 2 === 0) ? 2 : 1; }
        
        function fusionner(f1, f2) { 
            return [
                booleLigne(f1, f2), 
                booleLigne(f1, f2), 
                booleLigne(f1, f2), 
                booleLigne(f1, f2)
            ]; 
        }

        function toggRamli() {
            let m = []; 
            
            // 1. Kër 1 ba 4 (Ndey yi)
            for (let i=0; i<4; i++) {
                m.push(rëddRandom());
            }
            
            // 2. Kër 5 ba 8 (Doom yi)
            m.push([m[0][0], m[1][0], m[2][0], m[3][0]]); // Kër 5 (Boppu Ndey yi)
            m.push([m[0][1], m[1][1], m[2][1], m[3][1]]); // Kër 6 (Dënnu Ndey yi)
            m.push([m[0][2], m[1][2], m[2][2], m[3][2]]); // Kër 7 (Biiru Ndey yi)
            m.push([m[0][3], m[1][3], m[2][3], m[3][3]]); // Kër 8 (Tànku Ndey yi)

            // 3. Kër 9 ba 12 (Sët yi)
            m.push(fusionner(m[0], m[1])); // Kër 9 = K1 + K2
            m.push(fusionner(m[2], m[3])); // Kër 10 = K3 + K4
            m.push(fusionner(m[4], m[5])); // Kër 11 = K5 + K6
            m.push(fusionner(m[6], m[7])); // Kër 12 = K7 + K8

            // 4. Kër 13 ba 16 (Jeexal bi)
            m.push(fusionner(m[8], m[9]));   // Kër 13 = K9 + K10
            m.push(fusionner(m[10], m[11])); // Kër 14 = K11 + K12
            m.push(fusionner(m[12], m[13])); // Kër 15 = K13 + K14
            m.push(fusionner(m[14], m[0]));  // Kër 16 = K15 + K1

            // Affichage Grid bi
            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';
            m.forEach((fig, i) => {
                let cle = fig.join(",");
                let name = firi_atte[cle]?.tur || "Xamul";
                let visuel = fig.map(p => p === 1 ? "•" : "••").join("<br>");
                grid.innerHTML += `<div class="kër"><div class="kër-tur">Kër ${i+1}</div><div class="tomb-yi">${visuel}</div><div class="mbindeef-tur">${name}</div></div>`;
            });

            // Corigé gu wër: J jël index array dëgg yi [0] ak [12]
            let cleM1 = m[0].join(",");
            let cleM13 = m[12].join(",");

            let firiM1 = firi_atte[cleM1] || { tur: "Mbindeef", nit_ki: "Wax gu bir féeñul" };
            let firiM13 = firi_atte[cleM13] || { tur: "Mbindeef", xalaat: "Wax gu bir féeñul" };

            const texteAtte = `
                <span class="highlight">1. Mbiri Nit Ki (Kër 1 - ${firiM1.tur}):</span><br>
                ${firiM1.nit_ki}<br><br>
                <span class="highlight">2. Li nekk ci Xalaatam (Kër 13 - ${firiM13.tur}):</span><br>
                ${firiM13.xalaat}
            `;

            document.getElementById('atteTexte').innerHTML = texteAtte;
            document.getElementById('atteBox').style.display = 'block';
        }
    </script>
</body>
</html>
