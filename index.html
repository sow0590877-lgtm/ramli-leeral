<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli Leeral - Téggaloo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 10px;
        }
        h1 { color: #ffcc00; margin-bottom: 5px; }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .mother-input {
            margin: 12px 0;
            padding: 8px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select {
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 16px;
            width: 65%;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .result-grid {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            display: none;
        }
        .house-box {
            background: #252525;
            padding: 10px 5px;
            border-radius: 5px;
            border: 1px solid #333;
            text-align: center;
        }
        .house-title {
            font-size: 13px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 8px;
        }
        .geomancy-figure {
            font-family: monospace;
            font-size: 20px;
            line-height: 1.2;
            letter-spacing: 2px;
            color: #ffffff;
            background: #1a1a1a;
            padding: 5px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>🔮 Ramli Leeral</h1>
    
    <div class="container">
        <h3>Tànnal 4 Ndiy yi</h3>
        
        <div class="mother-input">
            <label>Kër 1 :</label>
            <select id="m1">
                <option value="2,2,1,1">Yuusufa (2,2,1,1)</option>
                <option value="1,1,2,1">Solaymaan (1,1,2,1)</option>
                <option value="2,1,1,1">Ayyuub (2,1,1,1)</option>
                <option value="1,2,1,2">Muhammad (1,2,1,2)</option>
                <option value="2,1,1,2">Haliyyu / Ousmane (2,1,1,2)</option>
                <option value="1,2,2,1">Lomara (1,2,2,1)</option>
                <option value="1,1,1,1">Adama (1,1,1,1)</option>
                <option value="2,2,2,2">Médi (2,2,2,2)</option>
                <option value="1,1,2,2">Ibrahima (1,1,2,2)</option>
                <option value="2,2,1,2">Missa (2,2,1,2)</option>
                <option value="1,2,1,1">Insa (1,2,1,1)</option>
                <option value="1,1,1,2">Trawore (1,1,1,2)</option>
                <option value="2,1,2,2">Seahu (2,1,2,2)</option>
                <option value="1,2,2,2">Yunus (1,2,2,2)</option>
                <option value="2,2,2,1">Muusaa (2,2,2,1)</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 2 :</label>
            <select id="m2">
                <option value="2,1,1,1">Ayyuub (2,1,1,1)</option>
                <option value="2,2,1,1">Yuusufa (2,2,1,1)</option>
                <option value="1,1,2,1">Solaymaan (1,1,2,1)</option>
                <option value="1,2,1,2">Muhammad (1,2,1,2)</option>
                <option value="2,1,1,2">Haliyyu / Ousmane (2,1,1,2)</option>
                <option value="1,2,2,1">Lomara (1,2,2,1)</option>
                <option value="1,1,1,1">Adama (1,1,1,1)</option>
                <option value="2,2,2,2">Médi (2,2,2,2)</option>
                <option value="1,1,2,2">Ibrahima (1,1,2,2)</option>
                <option value="2,2,1,2">Missa (2,2,1,2)</option>
                <option value="1,2,1,1">Insa (1,2,1,1)</option>
                <option value="1,1,1,2">Trawore (1,1,1,2)</option>
                <option value="2,1,2,2">Seahu (2,1,2,2)</option>
                <option value="1,2,2,2">Yunus (1,2,2,2)</option>
                <option value="2,2,2,1">Muusaa (2,2,2,1)</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 3 :</label>
            <select id="m3">
                <option value="1,2,1,2">Muhammad (1,2,1,2)</option>
                <option value="2,2,1,1">Yuusufa (2,2,1,1)</option>
                <option value="1,1,2,1">Solaymaan (1,1,2,1)</option>
                <option value="2,1,1,1">Ayyuub (2,1,1,1)</option>
                <option value="2,1,1,2">Haliyyu / Ousmane (2,1,1,2)</option>
                <option value="1,2,2,1">Lomara (1,2,2,1)</option>
                <option value="1,1,1,1">Adama (1,1,1,1)</option>
                <option value="2,2,2,2">Médi (2,2,2,2)</option>
                <option value="1,1,2,2">Ibrahima (1,1,2,2)</option>
                <option value="2,2,1,2">Missa (2,2,1,2)</option>
                <option value="1,2,1,1">Insa (1,2,1,1)</option>
                <option value="1,1,1,2">Trawore (1,1,1,2)</option>
                <option value="2,1,2,2">Seahu (2,1,2,2)</option>
                <option value="1,2,2,2">Yunus (1,2,2,2)</option>
                <option value="2,2,2,1">Muusaa (2,2,2,1)</option>
            </select>
        </div>

        <div class="mother-input">
            <label>Kër 4 :</label>
            <select id="m4">
                <option value="1,1,2,1">Yuusufa (2,2,1,1)</option>
                <option value="1,2,2,1">Solaymaan (1,1,2,1)</option>
                <option value="2,2,2,1">Ayyuub (2,1,1,1)</option>
                <option value="2,1,1,1">Muhammad (1,2,1,2)</option>
                <option value="2,1,1,2">Haliyyu / Ousmane (2,1,1,2)</option>
                <option value="2,1,2,2">Lomara (1,2,2,1)</option>
                <option value="1,2,2,2">Adama (1,1,1,1)</option>
                <option value="2,2,2,2">Médi (2,2,2,2)</option>
                <option value="1,1,1,1">Ibrahima (1,1,2,2)</option>
                <option value="2,2,2,2">Missa (2,2,1,2)</option>
                <option value="1,2,1,2">Insa (1,2,1,1)</option>
                <option value="1,1,1,2">Trawore (1,1,1,2)</option>
                <option value="2,1,2,2">Seahu (2,1,2,2)</option>
                <option value="1,2,2,2">Yunus (1,2,2,2)</option>
                <option value="2,2,2,1">Muusaa (2,2,2,1)</option>
            </select>
        </div>

        <button onclick="calculerRamli()">Boole Poñ yi</button>

        <!-- Résultats sous forme de tableau de cartes -->
        <div id="results" class="result-grid"></div>
    </div>

    <script>
        function addFigures(f1, f2) {
            let result = [];
            for (let i = 0; i < 4; i++) {
                let sum = f1[i] + f2[i];
                result.push(sum % 2 === 0 ? 2 : 1);
            }
            return result;
        }

        // Firi poñ yi ci anam gu téggaloo (Bòpp ba Tank) mel ni sa natal
        function formatVerticalDots(arr) {
            return arr.map(num => num === 1 ? "o" : "o o").join("<br>");
        }

        function calculerRamli() {
            let m1 = document.getElementById("m1").value.split(",").map(Number);
            let m2 = document.getElementById("m2").value.split(",").map(Number);
            let m3 = document.getElementById("m3").value.split(",").map(Number);
            let m4 = document.getElementById("m4").value.split(",").map(Number);

            let h = {};
            h[1] = m1; h[2] = m2; h[3] = m3; h[4] = m4;

            h[5] = [m1[0], m2[0], m3[0], m4[0]];
            h[6] = [m1[1], m2[1], m3[1], m4[1]];
            h[7] = [m1[2], m2[2], m3[2], m4[2]];
            h[8] = [m1[3], m2[3], m3[3], m4[3]];

            h[9] = addFigures(h[1], h[2]);
            h[10] = addFigures(h[3], h[4]);
            h[11] = addFigures(h[5], h[6]);
            h[12] = addFigures(h[7], h[8]);

            h[13] = addFigures(h[9], h[10]);
            h[14] = addFigures(h[11], h[12]);
            h[15] = addFigures(h[13], h[14]);
            h[16] = addFigures(h[15], h[1]);

            let html = "";
            for (let i = 1; i <= 16; i++) {
                let borderStyle = (i === 15) ? "style='border: 2px solid #ffcc00; background: #332b00;'" : "";
                html += `<div class="house-box" ${borderStyle}>
                            <div class="house-title">Kër ${i}</div>
                            <div class="geomancy-figure">${formatVerticalDots(h[i])}</div>
                         </div>`;
            }

            let resDiv = document.getElementById("results");
            resDiv.innerHTML = html;
            resDiv.style.display = "grid";
        }
    </script>
</body>
</html>
