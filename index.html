<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Ramli - 16 Figures</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 800px; margin: 20px auto; }
        .house { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .dots { font-size: 24px; letter-spacing: 5px; line-height: 1.2; color: #ffcc00; }
        button { background-color: #007644; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        button:hover { background-color: #005c34; }
    </style>
</head>
<body>

    <h1>Générateur de Thème Ramli</h1>
    <button onclick="genererTheme()">Lancer le Tirage (Tombée)</button>

    <div class="grid" id="ramliGrid">
        <!-- Les 16 maisons s'afficheront ici -->
    </div>

    <script>
        // Fonction pour générer une figure aléatoire (1 ou 2 points par ligne)
        function genererNdey() {
            return [
                Math.floor(Math.random() * 2) + 1, // Tête
                Math.floor(Math.random() * 2) + 1, // Poitrine
                Math.floor(Math.random() * 2) + 1, // Ventre
                Math.floor(Math.random() * 2) + 1  // Pieds
            ];
        }

        // Fonction pour additionner deux lignes selon les règles du Ramli (Pair/Impair)
        function additionnerLignes(l1, l2) {
            let total = l1 + l2;
            return (total % 2 === 0) ? 2 : 1; // 2 points si pair, 1 point si impair
        }

        // Fonction principale pour calculer tout le thème
        function genererTheme() {
            let maisons = [];

            // 1. Génération des 4 Mères (Ndey yi : Maisons 1 à 4)
            for (let i = 0; i < 4; i++) {
                maisons.push(genererNdey());
            }

            // 2. Génération des 4 Filles (Doom yi : Maisons 5 à 8)
            for (let i = 0; i < 4; i++) {
                maisons.push([
                    maisons[0][i], // Tête
                    maisons[1][i], // Poitrine
                    maisons[2][i], // Ventre
                    maisons[3][i]  // Pieds
                ]);
            }

            // 3. Génération des Sœurs/Neveux (Sët yi : Maisons 9 à 12)
            maisons.push(fusionner(maisons[0], maisons[1])); // M9  = M1 + M2
            maisons.push(fusionner(maisons[2], maisons[3])); // M10 = M3 + M4
            maisons.push(fusionner(maisons[4], maisons[5])); // M11 = M5 + M6
            maisons.push(fusionner(maisons[6], maisons[7])); // M12 = M7 + M8

            // 4. Génération des maisons de conclusion (Maisons 13 à 16)
            maisons.push(fusionner(maisons[8], maisons[9]));   // M13 = M9 + M10
            maisons.push(fusionner(maisons[10], maisons[11])); // M14 = M11 + M12
            maisons.push(fusionner(maisons[12], maisons[13])); // M15 = M13 + M14 (Le Juge)
            maisons.push(fusionner(maisons[14], maisons[0]));  // M16 = M15 + M1 (La Sentence)

            afficherGrid(maisons);
        }

        // Fonction outil pour fusionner deux figures ligne par ligne
        function fusionner(f1, f2) {
            return [
                additionnerLignes(f1[0], f2[0]),
                additionnerLignes(f1[1], f2[1]),
                additionnerLignes(f1[2], f2[2]),
                additionnerLignes(f1[3], f2[3])
            ];
        }

        // Fonction pour afficher visuellement les résultats dans le HTML
        function afficherGrid(maisons) {
            const grid = document.getElementById('ramliGrid');
            grid.innerHTML = '';

            maisons.forEach((fig, index) => {
                let div = document.createElement('div');
                div.className = 'house';
                
                // Convertit les chiffres 1 et 2 en points visuels (• ou ••)
                let visuel = fig.map(points => points === 1 ? "•" : "••").join("<br>");
                
                div.innerHTML = `<h3>Maison ${index + 1}</h3><div class="dots">${visuel}</div>`;
                grid.appendChild(div);
            });
        }
    </script>
</body>
</html>
