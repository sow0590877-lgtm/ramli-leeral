    <script>
        const dekkaleYi = {
            "Janfa": { code:, firi: "Janfa day leral mbiri naxate, rëcc-rëcc walla tawat buy ñëw ci sa wet." },
            "Adama": { code:, firi: "Barke, am-am bu bees, ak mbegeel gu sell mu ngi ci biir kër gi." },
            "Mahdi": { code:, firi: "Teranga, jamm gu dëggu, ak ndàm ci kaw say mbir ak say xalaat." },
            "Idriss": { code:, firi: "Xam-xam bu xote, daraja gu rëy, ak yoonu njàng walla liggéey buy soti." },
            "Alwassa": { code:, firi: "Ubbiwum buntu barke, yaatal say bëgg-bëgg, ak liggéey bu rëy." },
            "Kaba": { code:, firi: "Tukki bu sori, soppi dëkkaay, walla gàddaay bu am solo mu ngi ci yoon." },
            "Nusra": { code:, firi: "Ndàm ak nguru gu bees ci sa dund. Say jafé-jafé yëpp dañuy saafara." },
            "Utba": { code:, firi: "Mujeel gu baax, xalaat bu dëggu, walla sàkk kër gu bees." },
            "Lahuze": { code:, firi: "Wax ju rëy walla xabar buy ñëw digg yoon. Faww nga maslaa." },
            "Bayada": { code:, firi: "Weexal xol, jamm, sellal bëgg-bëgg, ak rëcc ci say musiba." },
            "Humra": { code:, firi: "Xulóo, xéex, walla colére bu am ci wet. Faww nga teey ci say baat." },
            "Ingis": { code:, firi: "Guddu fann, dëgëral wér-wérle, ak dëj mbir mu yàgg ci sa dund." },
            "Nusra-Daxil": { code:, firi: "Dugal lu bees lu am barke, xaliss, walla teranga ci biir kër." },
            "Nusra-Xarij": { code:, firi: "Gennal mbir walla tawat buy genn. Lu rëcc ci sa loxo." },
            "Ijtima": { code:, firi: "Daje bu am solo, mbooloo, walla dëgëral maslaa ak say xarit." },
            "Utba-Xarij": { code:, firi: "Xabar bu rëy bu genn ci bitim réer walla lu sori la lay fecc." }
        };

        function booleXet(c1, c2) {
            let res = [];
            for(let i=0; i<4; i++) {
                res.push((c1[i] + c2[i]) % 2 === 0 ? 2 : 1);
            }
            return res;
        }

        function woneBet(code) {
            return code.map(p => p === 1 ? "•" : "••").join("<br>");
        }

        function jelTur(code) {
            for (let nom in dekkaleYi) {
                if (dekkaleYi[nom].code.join(',') === code.join(',')) return nom;
            }
            return "Kër gu Bees";
        }

        function sampeTeere() {
            let m1 = dekkaleYi[document.getElementById('m1').value].code;
            let m2 = dekkaleYi[document.getElementById('m2').value].code;
            let m3 = dekkaleYi[document.getElementById('m3').value].code;
            let m4 = dekkaleYi[document.getElementById('m4').value].code;

            // Sàmpe 16 kër yi dëgg-dëgg (1 ba 16)
            let t = {};
            t[1] = m1; t[2] = m2; t[3] = m3; t[4] = m4;

            // 5 ba 8: Les Filles
            t[5] = [m1[0], m2[0], m3[0], m4[0]];
            t[6] = [m1[1], m2[1], m3[1], m4[1]];
            t[7] = [m1[2], m2[2], m3[2], m4[2]];
            t[8] = [m1[3], m2[3], m3[3], m4[3]];

            // 9 ba 12: Les Neveux
            t[9] = booleXet(t[1], t[2]);
            t[10] = booleXet(t[3], t[4]);
            t[11] = booleXet(t[5], t[6]);
            t[12] = booleXet(t[7], t[8]);

            // 13 ak 14: Les Témoins
            t[13] = booleXet(t[9], t[10]);
            t[14] = booleXet(t[11], t[12]);

            // 15: Le Juge
            t[15] = booleXet(t[13], t[14]);

            // 16: Le Juge des Juges
