<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramli - 4 Ràyyo</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        h2 { color: #4CAF50; font-size: 20px; }
        .ràyyo-container { max-width: 400px; margin: 15px auto; }
        .ràyyo { background: #1e1e1e; border: 2px solid #444; height: 50px; margin: 10px 0; border-radius: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: #4CAF50; transition: 0.2s; }
        .ràyyo:active { background: #333; border-color: #4CAF50; }
        .grid-mmaam { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 15px auto; }
        .mmaam-box { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #555; min-height: 120px; }
        .bet-tomb { font-size: 24px; color: #ffeb3b; letter-spacing: 3px; line-height: 1.2; font-weight: bold; margin-top: 5px; }
        .grid-16 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 25px; }
        .box-16 { background: #252525; padding: 10px; border-radius: 5px; border: 1px solid #444; }
        .bet-16 { font-size: 20px; color: #ffeb3b; letter-spacing: 3px; line-height: 1; margin: 5px 0; }
    </style>
</head>
<body>

    <h2>Ramli - Tomb ci 4 Ràyyo</h2>
    <p id="status" style="color: #ff9800; font-weight: bold;">Cuqal ci ràyyo bu nekk 4 yoon ci sa baaram ngir tomb</p>

    <!-- Fi 4 Ràyyo yi doon ngir tomb ci baaram -->
    <div class="ràyyo-container">
        <div class="ràyyo" onclick="tombRàyyo(0)">RÀYYO 1 (Ullu kaw)</div>
        <div class="ràyyo" onclick="tombRàyyo(1)">RÀYYO 2 (Digg kaw)</div>
        <div class="ràyyo" onclick="tombRàyyo(2)">RÀYYO 3 (Digg suuf)</div>
        <div class="ràyyo" onclick="tombRàyyo(3)">RÀYYO 4 (Ullu suuf)</div>
    </div>

    <!-- Fi 4 mmaam yi di tàbbee -->
    <div class="grid-mmaam">
        <div class="mmaam-box"><b>M1</b><div class="bet-tomb" id="b1"></div></div>
        <div class="mmaam-box"><b>M2</b><div class="bet-tomb" id="b2"></div></div>
        <div class="mmaam-box"><b>M3</b><div class="bet-tomb" id="b3"></div></div>
        <div class="mmaam-box"><b>M4</b><div class="bet-tomb" id="b4"></div></div>
    </div>

    <!-- Fi 16 kër yi di gusee su mu maté -->
    <div class="grid-16" id="res"></div>

    <script>
        const nom = {"1,2,1,1":"Janfa", "1,1,1,1":"Adama", "2,1,2,2":"Mahdi", "1,1,2,1":"Idriss"};
        const txt = {"Janfa":"Naxate walla tawat.", "Adama":"Barke ak am-am.", "Mahdi":"Teranga ak jamm.", "Idriss":"Xam-xam ak daraja."};

        let kuñuCuq = 0;
        let mmaamYi = [[], [], [], []];

        function boole(c1, c2) { return c1.map((v, i) => (v + c2[i]) % 2 === 0 ? 2 : 1); }

        function tombRàyyo(lineIndex) {
            if (kuñuCuq >= 16) {
                kuñuCuq = 0; mmaamYi = [[], [], [], []];
                for(let i=1; i<=4; i++) document.getElementById('b'+i).innerHTML = "";
                document.getElementById('res').innerHTML = "";
            }

            // Di jël poñ bu hasard (1 walla 2) ci sa baaram boo bësé ràyyo bi
            let p = Math.floor(Math.random() * 2) + 1;
            
            // Jàdd mmaam bi mu wàcc (M1 ba M4)
            let mmaamIndex = Math.floor(kuñuCuq / 4);
            mmaamYi[mmaamIndex].push(p);
            kuñuCuq++;

            // Wone bët yi ci sa su nekk
            let numMmaam = mmaamIndex + 1;
            document.getElementById('b' + numMmaam).innerHTML = mmaamYi[mmaamIndex].map(v => v === 1 ? "•" : "••").join("<br>");

            document.getElementById('status').innerText = "Cuq nga " + kuñuCuq + " yoon ci ràyyo yi.";

            // Su maté 16 cuq dëgg dëgg, mu sàkk 16 kër yi
            if (kuñuCuq === 16) {
                document.getElementById('status').innerText = "16 Kër yi mat naññi ci sa 4 ràyyo!";
                calculer16Ker(mmaamYi, mmaamYi, mmaamYi, mmaamYi);
            }
        }

        function calculer16Ker(m1, m2, m3, m4) {
            let t = [null, m1, m2, m3, m4];
            
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];
            t = [m1, m2, m3, m4];

            t = boole(t, t); t = boole(t, t);
            t = boole(t, t); t = boole(t, t);

            t = boole(t, t); t = boole(t, t);

            t = boole(t, t);

            t = boole(t, t);

            let html = "";
            for(let i=1; i<=16; i++) {
                let n = nom[t[i].join(',')] || "Kër gu Bees";
                let f = txt[n] || "Mbirum kër gi baax na.";
                let b = t[i].map(p => p === 1 ? "•" : "••").join("<br>");
                html += `<div class="box-16"><b>Kër ${i}</b><br><span style="color:#ff9800">${n}</span><div class="bet-16">${b}</div><small>${f}</small></div>`;
            }
            document.getElementById('res').innerHTML = html;
        }
    </script>
</body>
</html>
